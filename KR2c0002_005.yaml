body:
  text: 晉孔晁註朙四明後學章檗校刻啇誓解第四十三度邑解第四十四武儆解第四十五五權解第四十六成開解第四十七作雒解第四十八皇門解第四十九大戒解第五十啇誓解第四十三王若曰告爾伊舊何父幾耿肅執乃殷之舊官人序文及太史比小史昔及百官里居獻民來尹師之敬諸戒疾聽朕言用胥生蠲尹王曰嗟爾衆予言非敢顧天命予來致上帝之威命明罰今惟新誥命爾敬諸朕話言自一言至于十話言其惟明命爾王曰在昔后稷惟上帝之言克播百榖豋禹之績凡在天下之庶民罔不維后稷之元榖用蒸享在啇先哲王明祀上帝亦維我后稷之元榖用告和用胥飲食肆啇先哲王維厥故斯用顯我西土今在啇紂昏憂天下弗顯上帝昏虐百姓奉天之命上帝弗顯乃命朕文考曰殪啇之多罪紂肆予小子發不敢忘天命朕考胥翕稷政肆上帝曰必伐之予惟甲子尅致天之大罰帝之來革紂之予亦無敢違天命敬諸昔在我西土我其齊言胥告啇之百無罪其維一夫予旣殛紂承天命予亦來休命爾百姓里居君子其周即命爾冡邦君無敢其有不告見于我有周其比冡邦君我無攸愛上帝曰必伐之今予惟明告爾予其徃追紂逹􆃌集之于上帝天王其有命爾百姓獻民其有綴艿夫自敬其有斯天命不令爾百姓無告西土疾勤其斯有何重天維用重勤興起我罪勤我無克乃一心爾多子其人自敬助天永休于我西土爾百姓其亦有安處在彼宜在天命及惻興亂予保奭其介有斯勿用天命若朕言在周曰啇百姓無罪朕命在周其乃先作我肆罪疾予惟以先王之道御復正爾百姓越則非朕負亂惟爾在我王曰百姓我聞古啇先哲王成湯克辟上帝保生啇民克用三徳疑啇民弗懐用辟厥辟今紂棄成湯之典肆上帝命我小國曰革啇國肆予明命汝百姓其斯弗用朕命其斯爾冡邦君啇庶百姓予則劉滅之王曰靃予天命維旣咸汝克承天休于我有周斯小國于有命不易昔我盟津帝休辨啇其有何國命予小子肆我殷戎亦辨百度美左右予予肆劉殷之命今予維篤祐爾予史太史違我史視爾靖疑胥敬請其斯一話敢逸僣予則上帝之明命予爾拜拜百姓越爾庶義庶刑子維及西土我乃其來即刑乃敬之哉庶聽朕言罔胥告度邑解第四十四維王尅殷國君諸侯乃厥獻民徴主九牧之師見王于殷郊王乃升汾之阜以望啇邑永嘆曰嗚呼不淑兊天對遂命一日維顯畏弗忘王至于周自至于丘中具明不寢王小子御告叔旦叔旦亟奔即王曰乆憂勞問周不寢曰安予告汝王曰嗚呼旦惟天不享于殷發之未生至于今六十年夷羊在牧飛鴻過野天自幽不享于殷乃今有成維天建殷厥徴天民名三百六十夫弗顧亦不賔成用戾于今嗚呼于憂茲難近飽于卹辰是不室我來所定天保何寢能欲王曰旦予克致天之明命定天保依天室志我共惡俾從殷王紂四方赤宜未定我于西土我維顯服及徳之方明叔旦泣涕于常悲不能對王傅于後王曰旦汝維朕逹弟子有使汝汝播食不遑暇食矧其有乃室今惟天使予惟二神授朕靈期于未致予休近懐予朕室汝惟㓜子大有知昔皇祖底于今朂厥遺得顯義告期付于朕身肆若農服田飢以望穫予有不顯朕卑皇祖不得高位于上帝汝㓜子庚厥心庶乃來班朕大環茲于有虞意乃懐厥妻子徳不可追于上民亦不可荅于朕下不賔在高祖維天不嘉于䧏來省汝其可瘳于茲乃今我兄弟相後我筮龜其何所即今用建庶建叔旦恐泣涕共手王曰嗚呼旦我圖夷茲殷其惟依天其有憲今求茲無逺慮天有求繹相我不難自洛汭延于伊汭居陽無固其有夏之居我南望過于三塗我北望過于有嶽丕願瞻過于河宛瞻于伊洛無逺天室其曰茲曰度邑武儆解第四十五惟十有二祀四月王告夢丙辰出金枝郊寶開和細書命詔周公旦立後嗣属小子誦文及寶典王曰嗚呼敬之哉汝勤之無蓋周未知所周不周啇無也朕不敢望敬守勿失以詔賔小子曰尤哉汝夙夜勤心之無窮也五權解第四十六維王不豫于五日召周公旦曰嗚呼敬之哉昔天𥘉䧏命于周維在文考克致天之命汝維敬哉先後小子勤在維政之失政有三機五權汝敬格之哉克中無苖以保小子于位三機一疑家二疑徳三質士疑家無授衆疑徳無舉士質士無逺齊吁敬之哉天命無常敬在三機五權一曰地地以權民二曰物物以權官三曰鄙鄙以權庶四曰刑刑以權常五曰食食以權爵不遵奉括食不宣不宣授臣極賞則淈淈得不食極刑則仇仇至乃别鄙庶則奴奴乃不滅國大則驕驕乃不給官無庶則荷荷至乃辛物庶則爵不和地庶則荒荒則聶人庶則匱匱乃匿嗚呼敬之哉汝慎和稱五權維中是以以長小子于位實維永寧成開解第四十七成王九年大開告用成王用之也周公大開告道周公曰嗚呼余夙夜之勤今啇孽競時逋播以輔余何循何循何慎王其敬文命無易天不虞逋播逃越之人以自輔當言啇餘紂子祿父競求是不虞者也敬天命備在昔文考躬修五典勉茲九功敬人畏天教以六則四守五示三極祗應八方立忠恊義乃作協和祇敬三極一天有九列别時隂陽二地有九州别處五行三人有四佐佐官維明五示顯允明所望謂天四佐當明謂五示示於民也子前疑後丞右輔左弼也五示一明位示士二明恵示衆三明主示寧四安宅示孥五利用示産明安宅王明三用則産業衆妻子寧固利産足窮家懐思終主爲之宗徳以撫衆衆和乃同同爲和同也言五示之義四守一政盡人材材盡致死二土守其城溝三障水以禦㓂四大有沙炭之政人任沙熾炭可以政適人也盡其材則死力効致大六則一和衆二發鬱三明怨四轉怒五懼疑六因欲之懼則疑之欲則因之此文鬱謂谷帛滯積省也怨則轉尅紂也王所以九功一賔好在笥二淫巧破制三好危破事四任利敗功五神巫動衆六盡哀民匱七荒樂無别八無制破教九任謀生詐也盡謂送終過制無别亂在笥謂實幣於司無節限不犯此則成功也同也任謀謂權變也和集集以禁實有離莫逐通其五典一言父典祭祭祀昭天百姓若敬二顯父豋徳徳䧏爲則則信民寧乃化則法信民心也言祭祀見享受福臣三正父豋過過慎於武設備無盈於前無自滿使正舉事過四機父豋失脩官官無不敬五制哀節用政治民懐官無不敬矣懐猶歸之也使剌譏之士舉政之失其官五典有常政乃重開之守内則順意外則順敬内外不爽是曰明王無爽也重開言王拜曰允哉維予聞曰何鄕非懐懐人惟思思若不及禍格無日至格式皇敬哉余小生思繼厥常以昭文祖定武考之列皇天式用嗚呼余夙夜不寧作雒解第四十八武王克殷乃立王子禄父俾守啇祀祭成湯封以鄼建管叔于東建蔡叔霍叔于殷俾監殷臣叔相禄父也東謂衛鄘霍武王旣歸成歲十二月崩鎬肂予岐周歲也肂攅塗乃謂乃後之周公立相天子三叔及殷東徐奄及熊盈以略宰攝政立謂爲奄謂殷之諸侯也殷禄父徐戎周公召公内弭父兄外撫諸侯九年夏六月葬武王於畢畢也弭安二年又作師旅臨衛政殷殷大震潰上曰潰下叛其䧏辟三叔王子禄父北奔管叔經而卒乃囚蔡叔于郭淩囚拘也郭凌地名凡所征熊盈族十有七國俘維九邑九邑罪重故囚之俘囚爲奴十七國之俘殷獻民遷于九里成周之地近王化也獻民士大夫也九里俾康叔宇于殷俾中旄父宇于東中旄代管叔康叔代霍叔周公敬念于後日予畏同室克追俾中天下春歸也周公追長尊王也成王二年秋迎周公三年及將致政乃作大邑成周于土中下土爲中王城也於天城方千七百二十丈郛方七百里南繫于洛水地因于㓨山以爲天下之大湊連接也湊會也郛郭也繫因皆制郊甸方六百里國西土爲方千里通爲圻内西土岐周分以百縣縣有四郡郡有鄙大縣城方王城三之一小縣立城方王城九之一三三其一九分居郡鄙不過百室以便野事之事耕桑農居鄙得以庶士士居國家得以諸公大夫治國家以大夫居治也治鄙以農凡工賈胥市臣撲州里俾無交爲異州里而居不相雜工賈百胥人臣撲各侍也交也胥乃設丘兆于南郊以上帝配后稷城内郊設築壇也南郭日月星辰先王皆與食謂郊時先王后稷諸受命於周乃建大社于周中也受封其壝東責土南赤土西白土北驪土中央疊以黄土将建諸侯鑿取其方一靣之土苞以黄土苴以白茅以爲土封故曰受則土於周室覆茅苴褁土封之爲社也其方謂建東方諸侯以青土乃位五宫大廟宗宫考宫路寝明堂廟也路寢王所居也明堂在國南者五宫宫府寺也大廟后稷二宫祖考也咸有四阿反玷重亢重郎常累復格藻梲設移旅楹惷常畫累棟也重即累屋也常累系也復格累之咸皆也廟四下日阿反玷外尚室也重亢惷謂藻井之節也言皆畫列柱爲之也孺也井藻梲畫梁柱也承屋曰移旅别也内階玄階堤唐山廧謂爲高之也廧謂畫山雲以黑石爲階唐中庭道堤應門庫臺玄閫可知也又以黒石爲門階也門者皆有臺於庫門見之後皇門解第四十九維正月庚午周公格左閎門會群門門曰皇門閎音格至也路寢左也皇曰嗚呼下邑小國克有耉老據屏位建沈入非不用明刑沈伏賢人不用明法耉老之賢人也又建立維其開告于予嘉徳之說是開告我於善徳之說言下邑所行而我法之命我辟王小至于大我聞在昔有國誓王之不綏于卹君也卹憂言思治也小至于大者小大邦乃維其有大門宗子勢臣内不茂揚肅徳訖亦有孚以助厥辟勤王國王家茂勉肅敬訖既也孚信也大門宗子適長勢臣顯仕乃方求論擇元聖武夫羞于王所羞進言旁自其善臣以至十有分私子苟克有常罔不允通咸獻言在于王所皆信通於義以益王也私子庶蘖也常謂常徳言人斯是助王㳟明祀敷明刑順是助法王也言善人君子皆王用有監明憲朕命用克和有成用能承天嘏命承天命王天下也監視明此事法故能百姓兆民用罔不茂在王庭言于王所也勉在王庭獻先用有勸永有于上下謂地也上謂天下人斯旣助厥勤勞王家明衆于也助君也謂大先人神祗報職用休俾嗣在厥家之王用善詔家先人及天地報王國用寧小人用格能稼穯咸祀天神戎兵克慎軍用克多之故神祐王用奄有四鄰逺土丕承萬子孫用末被先王之靈光大末終奄同丕至于厥後嗣弗見先王之明刑維時及胥學于非夷相學與非常也時有胥相爲是以家相厥室弗卹王國王家維徳是用不憂王家之用徳言勢人以大夫私家以昏求臣作威不祥不屑恵聽無辜之亂罪以惡民也祥善也不察無辭是羞于王之辭于王言順不進王阜良乃惟不順之言于是人斯乃非維直以應維作誣以對俾無依無助也王求善阜大良善故王無依助也而是人作誣以對譬若畋犬驕用逐禽其猶不克有獲得猶驕犬逐禽不能獲驕謂不習也言人之無是人斯乃䜛賊媢嫉以不利于厥家國妬以不利其君言賊仁賢忌媢嫉譬若匹夫之有婚妻曰予獨服在寢以自露厥家言謂美好喻昏臣也寝室也言自露於家媚夫有邇無逺乃食蓋善夫俾莫通在士王所野食爲利爲掩盖善夫使莫通媚夫見近利而無逺慮乃維有奉狂夫是陽是繩是以爲上是授司事于正長爲官長正長其事也言陽舉征夫以爲上人命用迷亂獄用無成小民率穯皆痛愁困也命者敎也率保用無用夀亡以嗣天用弗保其性天所不安用非其人故也安民之用無所宣施是故民失媚夫先受殄罰國亦不寧嗚呼敬哉監于茲朕維其及及其人也殄絕其世也朕藎臣夫明爾徳以助予一人憂進藎明之徳助我憂天下者也言我進用之臣夫明無維乃身之暴皆卹爾假予德憲資告予元之告我我大徳之所行也假借資用也借我法用徳譬若衆畋常扶予險乃而予于濟扶持也濟遂也如衆令畋獵相汝無作大戒解苐五十維正月旣生魄王訪于周公曰嗚呼朕聞維時兆厥工非不顯朕實不明維是始正其官兆始工官言政治維士非不務而不得助大則驕小則懾懾謀不極得助如此之難言務求士而不也極中予重位與輕服非共得福厚用遺重位輕服所重所重在於之是求益之言也立非夫徳而厚福用庸止生郄庸行信貳衆輯群政不輯多匿嗚呼予夙勤之無或告余非不念念不知之無有告我者徒知而不得明知也止容也常信貳則難得中也我雖勤周公曰於敢稱乃武考之言曰微言入心夙喻動衆大乃不驕行恵於小小乃不懾有此言言武王之連官集乗同憂若一謀有不行予惟重告爾同憂濟謀有不行必行也連官則同憂戚集衆事則庸厲以餌士權先申之明約必遺之其位不尊其謀不陽我不畏敬材在四方位陽其謀也在四方卑當畏敬聖者尊其言無擅于人塞匿勿行患戚咸服孝悌乃明巳塞逆擅人專順戚近也陰忌恵明立威耻亂使衆之道撫之以恵内姓無感外姓無讁同姓同宗外異姓讁過鄙即其亂則思治矣内長人知其罪上之明審教㓜乃勤貧賤制設九備乃無亂謀則不上明曰知罪隱情故九備一忠正不荒美好乃不作惡察則民化順人心明善而四說聲色憂樂盈匿五碩信傷辯曰費六出觀好怪内乃淫巧怪異碩大七謀躁内乃荒異八好威民衆日九富寵極足是大極内心其離也室九備旣明我貴保之應恊以動逺邇同功以動應恊以和動必謀和適同覆以觀之上明仁義援貢有備君也上謂聚財多以援成功克禁淫謀衆匿乃雍不行也言閉塞順得以動人以立行輯佐之道上必盡其志然後得其謀當先順人也言和輯求助無其信雖危不動以昭其乃得人此得其用也轉移貞信如上危而轉下乃不親親之不足信上危而下不也故王拜曰允哉允哉敬行天道汲冡周書卷五
