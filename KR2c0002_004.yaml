body:
  text: 晉孔晁註朙四明後學章檗校刻和寤解第三十四克寤解第三十五克殷解第三十六大匡解第三十七文政解第三十八大聚解第三十九世俘解第四十箕子解第四十一耆徳解第四十二和寤解第三十四王乃出圖啇至于鮮原也小山曰鮮近岐周之地召召公奭畢公高王曰嗚呼敬之哉無競惟人人允忠惟事惟敬小人難保爲强保安之也言王以多賢人后䧏惠于民民罔不格惟風行賄賄無成事如用賄則無成事人之歸惠如草應風緜緜不絕蔓蔓若何豪末不掇將成斧柯在微也此言防患王乃厲翼于尹氏八士唯固允讓王賢臣也厲奬厲也武徳䧏爲則振于四方行有令問成和不逆加用禱巫神人允順和志也言皆順成武寤解第三十五王赫奮烈八方咸發高城若地啇庶若化王之奮烈主土卒應若化恐怖也視高城若平地約期于牧案用師旅啇不足滅分禱上下先禱天地也於牧野將戰王食無疆王不食言庶赦定宗當言宗言不食言也赦其罪人定其尹氏八士太師三公咸作有續神無不饗而神明享其禱群臣言皆謀立功王克配天合于四海惟乃永寧四表徳合克殷解第三十六周車三百五十乗陣于牧野帝辛從野啇郊紂出朝十三年正月牧而迎戰也歌二十里武王使尚父與伯夫致師也挑戰王旣以虎賁戎車馳啇師啇師大敗三萬六千三百五十人有戎車三百五十乗則士卒五百人也虎賁三千啇辛奔内豋于廩臺之上屏遮而自燔于火目障屏遮武王乃手太白以麾諸侯諸侯畢拜遂揖之揖諸侯共追紂也太白旗名揖召也啇庶百姓咸俟于郊廓外也待文王於群賔僉進曰上天䧏休再拜稽首武王也諸侯賀武王荅拜先入適王所乃尅射之三發而後下車而擊之以輕呂斬之以黄鉞劒名輕吕拆懸諸太白其首斬絕適二女之所乃旣縊妾縊自縊也二女妲巳及嬖王又射之三發乃右擊之以輕吕斬之以玄鉞懸諸小白白旗名也玄鉞黑斧小乃出埸于厥軍去者宜居者居遷也埸平治社以及宮徹宜及期百夫荷素質之旗于王前也一作以前于王也素質白旗前爲王道叔振奏拜假拜假者也則群臣諸侯應奏行也曹叔振又陳常車周公把大鉞召公把小鉞以夾王三公夾衛王也常車威儀車也泰顛閎夭皆執輕吕以奏王王入即位于社太卒之左太卒屯兵以衛也執王輕吕當門奏群臣畢從毛叔鄭奉明水衛叔傅禮而康叔相禮群臣盡從王召公奭賛采師尚父牽牲也倅王也賛佐采事尹逸筴曰殷末孫受徳迷先成湯之明侮滅神祗不祀天地則宗廟以下廢可知也紂字受徳也神祗天地也舉昏暴啇邑百姓其彰顯聞於昊天上帝皆知紂惡也言上天五帝周公再拜稽首乃出天明命王天也受天大命以攺殷立王子武庚命管叔相監殷人爲三監乃命召公釋箕子之囚命畢公衛叔出百姓之囚囚者也紂所拘乃命南官忽振鹿臺之財巨橋之粟以施恵也忽即振散之乃命南官百逹史佚遷九鼎三巫寳三巫地名鼎王者所傳乃命閎夭封比干之墓縁也益其乃命宗祀崇賔饗禱之于軍饗祭前所禱之神宗祀主祀賔敬也乃班京也還鄗大匡解第三十七惟十有三祀王在管管叔自作殷之監東隅之侯咸受賜干王王乃旅之以上東隅名使陳其政事者也東隅自殷以東旅謁用大匡順九則八宅六位有此法言大匡寛儉㳟敬夙夜有嚴思所順也言當嚴敬昭質非撲撲有不明明執於私私回不中中忠於欲思慧醜詐絶私私欲也中於欲謂忠於昭信非展展盡不伊伊言於允思復醜譖伊伊誰也展似信而非昭讓非背背黨雍徳徳讓於敬思賢醜爭非背棄也讓以得之昭位非忿忿非直直立於衆思直醜比以息忿忿怒也位所以行道非昭政非閑閑非逺節節政於進思止醜殘閑之也故貴得政以道民以禁也節昭靜非窮窮居非意意動於行思靜醜躁靜窮非仁者好樂取昭潔非爲爲窮非㳙㳙潔於行思義醜貪利不以㳙潔於汚自昭因非疾疾非不貞貞固於事思任醜誕疾昭明九則九醜自齊齊則曰知悖則死勇醜義成九法威明此九法則所勇不知節則苟死於勇知害上則不豋于明堂明堂所以明道明道惟法化人惟以法法人惟重老重老惟寶嗚呼在昔文考戰戰惟時祗祗汝其寳也文王唯敬是道汝其言周尊重者老人及政之諸侯也用之汝夙夜濟濟無競惟人惟允惟讓不逺群正不邇䜛邪士逺䜛人言當近正汝不時行汝害于士士惟都人孝挮子孫道其如此也不行是文王之不官則不長官戒有敬官朝道舎賔祭器曰八宅敬則人宅順矣官以長官所戒惟綏比新故外内貴賤曰六位其道則位順也安之比之各以大官備武小官成長奉承大匡封攝外用和大大國和平中匡用均勞故禮新乃賔客士大夫小匡用恵施舎靜衆也靜安禁請無怨順生分殺不忘不憚不失其理不計分部俾若九則生欲在國國咸敬順維敬敬惟讓讓惟禮敬於國國人皆順之以敬讓言周大匡使順九則生其所也之禮辟不及寛有永假假於王道不及言同文政解第三十八惟十有三祀王在管管蔡開宗循開其宗族循縞宗管管叔之邑二叔從化也之政言王禁九慝昭九行濟九醜尊九徳止九過務九勝傾九戒固九守順九典其醜以好也順此戒也九人所茂政也濟謂濟九慝一不類二不服三不則四務有不功五外有内通六㓜不觀國七閭不通徑八家不開刑九大禁不令路徑不宣令也刑法也令九行一仁二行三讓四言五固六始七義八意九勇道也意於九醜思勇醜忘思意醜變思治醜亂思固醜轉思信醜姧思讓醜殘思行醜頑思仁醜舋禮義也殘謂殘九徳一忠二慈三禄四賞五民之利六啇工受資七祗民之死八無奪農九是民之則是民之則也敬死勸葬也九過一視民傲二聽民暴三逺慎而近䫉四法令亂五仁善是誅六不察而好殺七不念害行八不思前後九偷其身不路而助無漁九勝一二三同惡潜謀四同好和因五師征惡六迎旋便路七明賂施舎八㓜子移成九迪名書新而敎也蹈名之子書而新用潜謀潜宻之謀也移成謂易子九戒一内有柔成二示有危傾三旅有罷寘四亂有立信五敎用康經六合詳毀成七邑守維人八飢有兆積九勞休無期逸也合詳無徳而信也守邑無備恃其人柔成善柔謟人也罷寘言困倉暗也康危道衆皆九守一仁守以均二智守以等三固守以興四信守維假五城溝守立六廉守以名七戒守以信八競守以備九國守以謀當至於義也言假言立信九典一祗道以明之二稱賢以賞之三典師以敎之四四戚以勞之五位長以遵之六群長以老之七群醜以移之八什長以行之九戒卒以將之也遵行之以戒之事也將典師謀各隨所能而教之行陣也之軍旅嗚呼充虚爲害無由不通無虚不敗謂之充隂陽姦之虚也國無人謂大聚解三十九維武王勝殷撫國綏民乃觀於殷政告周公旦曰嗚呼殷政總總若風草有所積有所虚和此如何亂也總總言不革也有積有虚周公曰聞之文考來逺賔廉近者道别其隂陽之利相土地之宜水土之便總土宜以受民也禮逺賔廉近者道營邑制命之曰大聚先誘之以四郊王親在之自近四郊存也始也在賔大夫免列以選赦刑以寛復亡解辱復之亡者解之辱者削赦重皆有數此謂行風化也行風乃令縣鄙啇旅曰能來三室者與之一室之禄之耕禄者以一大夫闢開修道五里有郊十里有井二十里有舍旅也待行逺旅來至關人易資舎其委其資也貿易供市有五均早暮如一送行逆來振乏救窮早暮一價均平也言老弱疾病孤子寡獨惟政所先恤也當先民有欲畜發令畜牧命之以國爲邑以邑爲郷以鄕爲閭禍灾相卹資䘮比服比服祖喪服也邑閭比相救卹五戸爲伍以首爲長十夫爲什以年爲長家㝡服首爲伍合閭立教以威爲長合旅同親以敬爲長旅㑹敬親教由威行飲食相約與彈相庸耦耕耘男女有婚墳墓相連民乃有親通也言相六畜有群室屋旣完民乃歸之猪羊犬雞六畜牛馬卿立巫醫具百藥以備疾灾畜五味以備百草言五味草味同也非一立勤人以職孤立正長以順㓜立職喪以卹死立大葬以正同同職立立君子以脩禮樂立小人以教用兵兵之也禮樂干戚立卿射以習客春和獵耕耘以習遷行坐起隨行群行出入教芧與樹藝比長立職與田疇皆通田茅根衍通連比也比長之職立祭祀與歲榖豋下厚薄此謂徳教隨榖豋下也豐儉若其凶土陋民賤食貴貨是不知政故曰凶不順政山林藪澤以因其工匠役工以攻其材啇賈趣市以合其用行也言政外啇資貴而來貴物益賤資賤物出貴物以通其器使相也通其有無夫然則關夷市平財無鬱廢啇不乏資百工不失其時無愚不教無窮乏則此謂和徳之所致也言政治和若有不言乃政其凶陂溝道路藂苴丘坟不可樹榖者樹以材木種木除藂春發枯槁夏發葉榮秋發實䔫冬發薪烝以匡窮困之也以此匡揖其民力相更爲師因其土宜以爲民資資次用也更相爲師匡則生無乏用使無傳尸此謂仁徳溝壑傳於旦聞禹之禁春三月山林不豋斧以成草木之長夏三月川澤不入網罟以成魚鱉之長且以并農力執成男女之功女桑男耕功也成此夫然則有生而不失其宜萬物不失其性人不失其事天不失其時以成萬財萬財旣成放此爲人此謂正徳人用也放散供泉深而魚鼈歸之草木茂而鳥獸歸之稱賢使能官有材而歸之關市平啇賈歸之分地薄斂農民歸之水性歸下農民歸利然之至歴言自王若欲求天下民先設其利而民自至譬之若冬日之陽夏日之隂不召而民自來此謂歸徳之至也政善徳五徳旣明民乃知常武王再拜曰嗚呼允哉天民側側余知其極有宜長有國也側側喻多乃召昆吾治而銘之金版藏府而朔之月旦朔省之也昆吾古之利冶朔世俘解第四十維四月乙未日武王成辟四方通殷命有國執殷俘言成者克紂還歸而作也通之以爲國也此惟一月丙辰旁生魄若翼日丁巳王乃歩自于周征伐啇王紂紀始伐紂師度孟津也旁廣大月大時也此本越若來二月旣死魄越五日甲子朝至接于啇也朔越於死魄後爲則咸劉啇王紂執天惡臣百人臣崇侯之崇劉尅也天惡太公望命禦方來丁丣望至告以馘俘禦紂黨方來太公受命追戊辰王遂禦循自祀文王時日王立政尅紂告祖考壇禦追循亦祀以王政布天下墠而祭是日立吕他命伐越戲方壬申荒新至告以馘俘方紂三邑也吕他將也戲侯來命伐靡集干陳辛巳至告以馘俘陳紂二邑也侯來亦將也靡甲申百弇以虎賁誓命伐衛告以馘俘亦將百弇辛亥薦俘殷王鼎之鼎殷國武王乃翼矢珪矢憲告天宗上帝牢引於天也矢陳也稷木王不格服格于廟秉語治庶國籥人九終急於語治也廟無别人也不攺終天之服以告祖考王烈祖自太王太伯王季虞公文王邑考以列升維告殷罪子也皆升王於帝虞公虞仲邑考文王籥人造王秉黄鉞正國伯㒼於王伯之仕也人進則王進壬子王服衮衣矢琰格廟籥人造王秉黄鉞正邦君之位也正諸侯癸酉薦殷俘王士百人之士所王士紂者囚俘籥人造王矢琰秉黄鉞執戈王奏庸大享一終王拜手稽首王定奏其大享三終奏庸擊鐘大享獻爵甲寅謁我殷于牧野王佩赤白旂籥人奏武王入進萬獻明明三終武以干羽爲萬舞也謁告也明明詩篇名乙卯籥人奏崇禹生開三鍾終王定非一故連曰有事也崇禹生開皆篇名告庚子陳本命伐磨百韋命伐宣方新荒命伐蜀乙巳陳本命新荒蜀磨至告禽霍侯俘艾佚侯小臣四十有六禽禦八百有三百兩告以馘俘子三十六月禦大臣也此復説尅紂所命伐也庚百韋至告以禽宣力禽禦三十兩告以馘俘百韋命伐厲告以馘俘之言也言兩隅武王狩禽虎二十有二猫二糜五千二百三十五犀十有二氂七百二十有一熊百五十有一羆百一十有八豕三百五十有二貉十有八塵十有六麝五十麋三十鹿三千五百有八遂櫷其國武王克紂禽獸所獲武王遂征四方凡憝國九十有九國也憝惡馘魔億有十萬七千七百七十有九俘人三億萬有二百三十也俘馘之多此六言史也武王以不殺爲仁無縁馘億凡服國六百五十有二也此屬紂時四月旣旁生魄越六日庚戍武王朝至燎于周維予冲子綏文後天者言功業巳成故也此於甲乙十六日也先廟武王䧏自車乃俾史佚繇書于天號薦俘于天也使史佚用書重武王乃廢于紂矢惡臣人百人伐右厥甲小子鼎大師子乃鼎之衆也廢其惡人伐其小伐厥四十夫家君鼎師司徒司馬𥘉厥于郊號郊號令所伐也言𥘉克紂于啇武王乃夾于南門用俘皆施佩衣衣先馘入道以示衆也取乃表之施之言陳列俘馘于宗廟南門夾也以耻武王在祀太師負啇王紂懸首白旂妻二首赤斾乃以先馘入燎于周廟及妻首所馘入廟燎也王在祀主使樂師以紂首若翼日辛亥祀于位用籥于天位郊天祭俘所用籥此説詳庚戌明日也衣事越五日乙卯武王乃以庶祀馘于國周廟翼子冲子斷牛六斷羊二祭日其有斷然者於辛亥五以諸侯庶國乃竟告于周廟曰古朕聞文考修啇人典以斬紂身告于天于稷自周廟天稷也言諸侯竟殺牲用小牲羊犬豕於百神水土于誓社山川誓告也百神天宗水土曰惟予冲子綏文考至于冲子用牛于天于稷五百有四山川也乃宗廟用小牲羊豖于百神水土社二千七百有一以皆塩之所用甚多啇王紂于啇郊伐紂時更説始時甲子夕啇王紂取天智玉琰㻱身厚以自焚也㻱環以自厚也天智玉之上天美者凡厥有庶告焚玉四千告武衆人四千也王焚玉五日武王乃禆於千人求之四千庶則銷天智玉五在火中不銷玉亦不銷紂身不盡凡天智玉武王則寶與同寳不銷也言王者所凡武王俘啇舊玉億有百萬箕子耆徳並亡周書卷苐四
