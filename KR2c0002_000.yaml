front:
  text: 汲冡周書敘古書之存者六籍之外蓋亦無幾汲冡周書其一也其書十卷自度訓至于器服凡七十解自敘其後為一篇若書之有小序同孔眺為之注晉太康中盜發汲郡魏安釐王冡而得之故繫之汲冡所言文王與紂之事故謂之周書劉向謂是周時誓告號令孔子刪録之餘班固藝文志亦有其篇目司馬遷記武王伐紂之事正與此合然則兩漢之時巳在中祕非始出於汲冡也觀其屬辭成章體製絶不與百篇相似亦不類西京文字是蓋戰國之世逸民處七之所纂輯以備私藏者性命道德之幾微文武政教之要略與夫諡法職方時訓月令無不切於修已治人雖其間駁而不純要不失為古書也郡太守劉公廷幹好古尤至出先世所藏命刻板學宮俾行于世上不負古人之用心下得以廣諸生之聞見其淑惠後人不既多乎至正甲午冬十二月四明後學黃玢謹志
