body:
  text: 昭徳眺公武志汲冡書十卷蓋晉太康中汲郡與穆天子傳同得晉孔眺註蓋孔子删採之餘凡七十篇古者天子諸侯皆有史官唯書法信實者行于世秦漢罷黜封建獨天子之史存然史官或怯而阿世貪而曲筆虚美隱惡不足考信則儒學處士必私有記述以伸其志将來賴之以證史官之失其功亦大矣以司馬遷之博聞猶采數家之言以成其書况其下者乎亦有聞見單淺記録失實胸臆偏私褒貶弗公以誤後世在觀者慎擇而巳矣晉孔眺註周書十卷按隋唐經籍志藝文志皆稱此書得於晉太康中汲郡魏安釐王冡孔眺註或稱十卷或八卷大抵不殊若此則晉以前𥘉未有此也然劉向所録及班固並著周書七十一篇且謂孔子删削之餘而司馬遷史記武王克殷事蓋與此合豈西漢世巳得入中秘其後稍隱學者不道及盗發冡幸復岀邪篇目比漢但闕一耳必班劉司馬所巳繫之汲冡失其本矣書多駁雜宜孔子所以不取戰國處士私相綴續託周爲名孔子亦未見古章句或舛訛難讀聊復傳冩以待是正巽巖李燾夫子定書爲百篇矣孟子於武成取其二三䇿謂血流漂杵等語囗於誇也今所謂汲冡周書多誇詡之辭且雜以詭譎之說此豈文武周公之事而孔孟之所取哉然其間畏天敬民尊賢尚徳古先聖王之格言遺制尚多有之至於時訓明堂記禮者之所釆録克殷度邑司馬遷之所援㩀是蓋有不可盡廢者晉很曋曰周志有之勇則害上不豋於明堂其語今見之篇中此吝夫子未定之書也漢蕭何云周書曰天予不取反受其咎此則夫子旣定之後而書無此語意者其在逸篇乎其後班固志藝文書凡九家有周書七十一篇劉向云周時誥誓號令蓋孔子所論百篇之餘也以兩漢諸人之所纂記推之則非始岀於汲冡也明矣惜乎後世不復貴重文字日就舛訛予始得本於李巽巖家脫誤爲甚繼得陳正卿本用相參校脩補頗多其間數篇尚有不可句讀脫文衍字亦有不容强解者姑且刻之俟求善本更加増削庶使流傳以爲近古之書云嘉定十五年夏四月十一日東徐丁黼謹識
