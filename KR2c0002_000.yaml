front:
  text: 汲冡周書叙古書之存者六籍之外蓋亦無幾汲冡周書其一也其書十卷自度訓至于器服凡七十解自叙其後爲一篇若書之有小序同孔眺爲之註晉太康中盜發汲郡魏安釐王冡而得之故繫之汲冡所言文王與紂之事故謂之周書劉向謂是周時誓告號令孔子删録之餘班固藝文志亦有其篇目司馬遷記武王伐紂之事正與此合然則兩漢之時巳在中秘非始岀於汲冡也觀其屬辭成章體製絕不與百篇相似亦不類西京文字是蓋戰國之世逸民處七之所纂輯以備私藏者性命道徳之幾微文武政敎之要略與夫謚法職方時訓月令無不切於脩已治人雖其間駁而不純要不失爲古書也郡太守劉公廷榦好古尤至岀先世所藏命刻板學宮俾行于世上不負古人之用心下得以廣諸生之聞見其淑惠後人不旣多乎至正甲午冬十二月四明後學黄玢謹志
