front:
  text: 周書卷第十
  hash: sha256:b90ed22db8574c42506ec730c51c73f1c7fd62a981991e0d6a6334a34eb51ee6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0002_SBCK_010-1a}
body:
  text: 晉孔眺注明四明後學章檗校刻武紀解第六十八銓法解六十九器服解第七十武紀解第六十八幣帛之間有巧言令色事不成車甲之間有巧言令色事不捷克事而有武色必失其德臨權而疑必離其災不捷智不可於不足並於不幾則始而施幾而弗克無功國有三守卑辭重幣以服之弱國之守也修備以待戰敵國之守也循山川之險而國之僻國之守也伐服不祥伐戰危伐險難故善伐者不伐三守伐國有六時五動四順間其疏薄其疑推其危扶其弱乘其衰暴其約此謂六時扶之而不讓振之而不動數之而不服暴之而不革威之而不恐未可伐也此謂五動立之害毀之利克之易并之能以時伐之此謂四順立之不害毀之不利唯克之易并之不能可伐也立之害毀之未利克之難并之不能可動也靜以待衆力不與爭權弗果據德不肆國若是而可毀也地荒而不振德衰而失與無苦而危矣求之以其道無不得為之以其事而時無不成有利備無患事時至而不迎大祿乃遷延之不道行事乃困不作小動大殃謀有不足者二仁廢則文謀不足勇廢則武謀不足備廢則事謀不足國有本有幹有權有倫質有樞體土地本也人民幹也敵國侔交權也政教順成倫質也君臣和樞體也土地未削人民未散國權未傾倫質未移雖有人昏亂之君國未亡也國有幾失居之不可阻體之小也不果鄰家難復飾也封疆侵凌難復振也服國從失難復扶也大國之無養小國之畏事不可以本權失家之交不可以枉繩失鄰家之交不據直以約不虧體以隂不可虞而奪也不可䇿而服也不可親而侵也不可摩而測也不可求而循施度於體不慮費事利於國不計勞失德喪服於鄰家則不顧難矣交體侵凌則不顧權矣封疆不時得其所無為養民矣合同不得其位無畏患矣百姓屈急無藏畜矣擠社稷失宗廟離墳墓困鬼神殘宗族無為愛死矣卑辭而不聽財而無技計戰而足近告而無顧告過而不悔請服而不得然後絶好于閉門循險近説外授以天命無為是定亡也凡有事君民守社稷宗廟而先衰亡者皆失禮也大事不法弗可作法而不時弗可行時而失禮弗可長得禮而無備弗可成舉物不備而欲大功於天下者未有之也執不求周流舉而不幾其成亡薄其事而求厚其功亡內無文道外無武迹往不復來者有悔而求合者亡不難不費而致大功故令未有據名而不辱隱行而不困唯禮得之而無逆失之而無咎唯敬成事而不難序功而不費唯時勞而有成費而不亡唯當施而不拂成而有權久之而能唯義不知所取之量不知所施之度不知動靜之時不知吉凶之事不知困逹之謀疑此五者未可以動大事恃名不久恃功不立虛願不至妄為不祥太上敬而服其次欲而得其次奪而得其次爭而克其下動而上資其力凡建國君民內事文而和外事武而義其形慎而殺其政直而公本之以禮動之以時正之以度師之以法成之以仁此之道也銓法解第六十九有三不逺有三不近有三不畜敬謀祗德親同三不逺也聽讒自亂聽諛自欺近憝自惡三不近也如有忠言竭親以為信有如同好以謀易寇有如同惡合計掬慮慮泄事敗是謂好害三不畜也器服解第七十明器因外有三疲二用器服數犢四棓禁豐一荒韋獨食器甒迤膏候屑侯樂鉍泄參冠一竿素獨二丸弇焚菜膾五昔纁裏桃枝素獨蒲簟席皆素斧獨巾玄繢緌縞冠素紕玄冠組武卷組纓象瑱絺紳帶象玦朱極韋素獨簟籥捍次車羔冒純載枉線喪勤焚纓一給器因名有三幾玄􅌲纁裏桃枝獨蒲席皆素布獨巾玄象玄純周書序昔在文王商紂並立困于虐政將弘道以弼無道作度訓殷人作教民不知極將明道極以移其俗作命訓紂作淫亂民散無性習常文王惠和化服之作常訓上失其道民散無紀西伯修仁明耻示教作文酌上失其道民失其業囗囗凶年作糴匡文王立西距昆夷北備獫狁謀武以昭威懷作武稱武以禁暴文以綏德大聖允兼作允文武有七德文王作大武大明武小明武三篇穆王遭大荒謀救患分囗大匡脫簡此有囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗囗作九間文王唯庶邦之多難論典以匡謬作劉法文王卿士諗發教禁戒作文開維美公命于文王修身觀天以謀啇難作保開文王訓乎武王以繁害之戒作文繁文王在酆命周公謀啇難作酆保文啓謀乎後嗣以修身敬戒作大開小開二篇文王有疾告武王以民之多變作文警文王告武王以序德之行作文傅文王既沒武王嗣位告周公禁五戒作柔武武王忌啇周公勤天下於大小開武二篇武王評周公維道以為寶作寶典啇謀啓平周周人將興師以承之作酆謀武王將起師伐商寤有商警作寤警周將伐商順天革命申喻武義以訓乎民作武順武穆二篇武王將行大事乎商郊乃明德囗衆作和寤武寤二篇武王率六州之兵車三百五十乘以滅殷作尅殷武王作尅商建三監以救其民為之訓範脫簡此有囗囗囗囗囗囗囗囗囗作大聚脫簡此有囗囗囗囗囗囗囗囗囗囗囗武王既釋箕子囚俾民辟寧之以王作箕子武王秉天下論德施囗而囗位以官作考德武王命商王之諸侯綏定厥邦申義告之作商誓武王平商維定保天室規擬伊洛作度邑武王疾脫簡此有囗囗囗囗囗囗囗囗囗囗囗命周公輔小子告以正要作五權武王既沒成王元年周公忌商之孽訓敬命作成開周公既誅三監乃述武王之志建都伊洛作作洛周公會群臣于閎門以輔主之格言作皇門周公陳武王之言以贊巳言戒乎成王作大戒周公正三統之義作周月辨二十四氣之應以明天時作時訓周公制十二月賦政之法作月令周公肇制文王之諡義以垂于後作諡法周公將致政成王朝諸侯於明堂作明堂成王既即政因嘗麥以語羣臣而求助作嘗麥周公為太師告成王以五徴則作本典成王訪周公以民事周公陳六以觀察之作官人周室既寧八方會同各以其職來獻欲垂法厥後作王會周王云殁王制將衰穆王因祭祖不豫詢其守位作祭公穆王思保位惟艱恐貽世羞欲自警悟作史記王化雖弛天命方永四夷八蠻攸尊王政作職方芮伯稽古作訓納王于善暨執政小臣咸省厥躬作芮良夫晉侯尚力侵我王略叔向聞儲幼而果賢囗復王位作太子晉玉者德以飾躬用為所佩夏多罪湯將放之徴前事以戒後王也作殷祝民非后罔乂后非民罔與為邦慎政在微作周祝武以靖亂非直不尅作武紀積習生常不可不慎作銓法車服制度明不苟踰作器服周道於乎大備周書卷第十終
