body:
  text: 晉孔􅄯註朙四明後學章檗校􅈓芮良夫解第六十三太子晉解第六十四王佩解第六十五殷祝解第六十六周祝解第六十七芮良夫解第六十三芮伯若曰予小臣良夫稽道謀告其事而告之也伯爵若順也順子惟民父母致厥道無逺不服無道左右臣妾乃違道無違畔也無徳政民歸于德徳則民戴否則民讐茲言允效于前不逺不逺言近言驗於前世商紂不道夏桀之虐肆我有家亡爲戒也舉桀紂惡滅嗚呼惟爾天子嗣文武業惟爾執政小子同先王之臣昏行顧道王不若教王爲不順同爲昏闇言專利作威佐亂進禍民將弗堪亂進於禍也專利侵民佐治亂信乎其行惟王暨爾執政小子攸聞則亂皆所聞知行善則治行惡古人求多聞以監戒不聞是惟弗知故有所不知也言古人患不聞后除民害不惟民害害民乃非后惟其讐民爲怨讐害民是與后作􅀋后弗􅀋民不知后惟其怨行類善也不知君則怨言民不從上命從其所矣深民至億兆后一而巳寡不敵衆后其危哉無義對言下上寡者危也共相怨則嗚呼如之畜不養則畏人治民亦人養食之則擾服雖家也然今爾執政小子惟以貪䛕爲事不懃徳以備難利專從爲䛕爲貪曲下民胥怨財單竭手足靡措弗堪戴上不其亂而罪民不堪命而作亂言民相與怨上上加之以予小臣良夫觀天下有土之君諸侯也有土謂之厥徳不逺罔有代徳罔有天下言無逺徳也時爲王之患其惟國人爲患也是國人嗚呼惟爾執政朋友小子其惟洗爾心攺爾行克憂徃愆以保爾居心洗安爾之居位攺行憂徃過則爾乃瞶禍翫烖遂弗悛余未知王之所定矧乃不知王定况貪䛕之臣能得其所也聵陽不聞翫心不惕悛攺矧况也尚惟禍􅀤於人之攸忽於人之攸輕不存焉變之攸伏之所起謂不民也言人所輕忽則禍爾執政小子不圖善偷生茍安爵賄成成不任徳也茍安無逺慮賄賢智箝口小人鼓舌逃害要利並得厥求唯曰哀哉以要利各得其求君子爲之賢者得黙以逃害小人佞謟也哀者我聞曰以言取人人飾其言以行取人人竭其行飾言無庸竭行有成故也欲行有成故也君子不以言舉人無功惟爾小子飾言事王寔蕃有徒王貌受之終弗􅀗用面相誣􅀩及爾顛覆無實也君臣之相誣蒙必相及共顛蕃多徒衆言非一也貌謂外相悅而也覆之爾自謂有餘予謂爾弗足敬思以徳備乃禍難也以用也乃汝也言其不足於道義難至而悔悔將安及無曰予爲惟爾之禍言也爲不太子晉解第六十四晉平公使叔譽于周見太子晉而與之言夫叔向也叔譽者大子名晉也周靈王太五稱而五窮逡廵而退其不遂事遂終也五稱説五歸告曰太子晉行年十五而臣弗能與言稱其賢告平公也才君請歸聲就復與田若不反及有天下將以爲誅邑周衰晉取之也聲就復與周之二平公􅀅歸之師曠不可曰請使瞑臣徃與之言若能幪予反而復之故稱瞑幪復也度師曠晉大夫無目否也謀還與師曠見太子稱曰吾聞王子之語高於泰山夜寝不寐晝居不安不逺長道而求一言山言無上言高於太􅏇渇也也不安至王子􅀿之曰吾聞太師將來甚喜而又懼吾年甚少見子而懾盡忘吾其度所以爲謙懾而忘度師曠曰吾聞王子古之君子甚成不驕自晉始如周行不知勞以驕易也有成徳不王子􅀿之曰古之君子其行至慎委積施關道路無限百姓悅之相將而逺逺人來驩視道如尺君子尺踰近言巳不及古師曠告善又稱曰古之君子其行可則由舜而下其孰有廣徳則之君子也問舜以下可法王子􅀿之曰如舜者天舜居其所以利天下奉翼逺人皆得巳仁此之謂天合天道言其仁如禹者聖勞而不居以利天下好取不好與必度其正是之謂聖貪財利與其功盡力溝洫勞也道也合聖如文王者其大道仁其小道恵三分天下而有其二敬人無方服事於商既有其衆而返失其身此之謂仁在勞謙㳟儉日夜不息返失之勤以其仁徳人恵懷之行無常唯賢所如武王者義殺一人而以利天下異姓同姓各得之謂義人一義善紂也師曠告善又稱曰宣辦各命異姓惡方王侯君公何以爲尊何以爲上事儀問其王子􅀿之曰人生而重丈夫謂之胄子胄子成人能治上官謂之士胄士率衆時作謂之曰伯伯能移善於衆與百姓同謂之公同謂好義作謂農功公能􅀣名與物天道俱謂之侯侯能成群謂之君成謂成物群謂之爲長也立民生物謂化施於民也君有廣徳分任諸侯而敦信曰予一人也敦厚善至于四海曰天子逹於四荒曰天王四荒四表四海四夷四荒至莫有怨訾乃豋爲帝而論事義以爲之名者也訾嘆恨也合五等之尊卑師曠罄然又稱曰温㳟敦敏方徳不攺聞物下學以起尚豋帝臣乃叅天子自古誰起其物義也問最賢之人也罄然自嚴整也方道􅀄本也王子􅀿之曰穆穆虞舜朙明赫赫立義治律萬物皆作分均天財萬物熈熈非舜而誰能盛言舜臣堯功徳如此也律法也謂致其物也熈熈和師曠東躅其足曰善哉善哉踏也東躅王子曰太師何舉足驟師曠曰天寒足躅是以數也問故師曠戲荅驟亦數也王子戲王子曰請入坐遂敷席注瑟師曠歌無射曰國誠寧矣逺人來觀修義經矣好樂無荒燕室坐歌此辭而交言於堂故更入射之律音合於無乃注瑟於王子王子歌嶠曰何自南極至于北極絶境越國弗愁道逺美王子也王子述舊曲嶠曲名也師曠作新曲也諌師曠蹶然起曰􅉂臣請歸疾貌蹶然王子賜乗車四馬曰太師亦善御之賜則自王然後行可知也禮爲天子三賜不及者馬此師曠對曰御吾未之學也王子曰汝不爲夫時詩云馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣塵塵取予不疑以是御之塵亦和貌也不疑和之心也馬不剛轡不柔言和擾也塵師曠對曰􅉂臣無見爲人辯也唯耳之恃而耳又寡聞而易窮王子汝􅀅爲天下宗乎耳也宗尊也天下所尊則辯别也爲人有所别唯恃者也有明王王子曰太師何汝戲我乎自太皥以下至于堯舜禹未有一姓而再有天下者夫大當時而不伐天何可得斯不立矣言周衰未盡巳不必立也言自庖犧至禹其子孫未有期運當時且吾聞汝之人年長短告吾師曠對曰汝聲清汙汝色赤白火色不夀火色赤知聲者則色亦然清角也言音汙沈木木生王子曰吾後三年上賔于帝所汝慎無言將及汝賔于天帝言死必爲之事不欲令人知也之所􅀑神之則王子師曠歸未及三年告死者至及未則王子年十七而卒也三年幷歸之年爲三年玉佩解第六十五玉者所佩在徳徳在利民民在順上也天子事天所言以利民爲徳使事上以威下合爲在因時􅀿事則易成􅀿爲其機得時所爲合謀成在周長有功在力多多則功多也周忠信也力昌大在自克不過在數懲有懲艾則無過也以義勝欲得昌大數不困在豫慎見禍在未形慎則不困也事未成而豫除害在脆斷安民在知過用兵在知時民􅀅安生時謂可戈時也能断所不思也知過􅂺攺勝大患在合人心殃毒在信疑患之有哉舉合民心何孽子在聴内化行在知和於孽内聴灾也可否相濟曰和孽而吐於中言宜其生施舎在平心不幸在不聞其過以聞巳過爲幸貴速攺也施謂施恵舎謂赦罪聖人福在受諫基在愛民固在親賢基親賢人則固明君之義也受諫則無非故福以愛民爲禍福在所宻利害在所近存亡在所用良則福利至反是則禍害至所與宻皆親近所利用皆忠離合在出命尊在慎威安在恭巳危亡在不知時命敎㳟巳不妄則安時謂天時得其時也善則事合否則離矣烕得其宜則尊見善而怠時至而疑亡正䖏邪是弗能居此得失之方也不可不察慮奸術是不居大之道也乃是得失之道也怠懈堕不能行也疑由豫不果也邪姧術也殷祝解第六十六湯將放桀于中野或者欲觧之此事不然矣士民聞湯在野皆委貨扶老携㓜奔國中虛人又不然矣言桀國中空無桀請湯曰國所以爲國者以有家家所以爲家者以有人也今國無家無人矣君有人請致國君之有也天下也此國爲湯曰否昔大帝作道明教士民今君王滅道殘政士民惑矣吾爲王明之之事於士民也大帝謂禹明禹士民復致於桀曰以簿之居濟民之賤何必君更也言與君更與桀徙避此士民辭也薄湯所居湯桀與其属五百人南徙千里止於不齊民徃奔湯於中野地名不齊桀復請湯言君之有也湯曰否我爲君王明之士民復重請之桀與其属五百人徙於魯魯士民復奔湯名也魯地桀又曰國君之有也吾則外人有言彼以吾道是邪我將爲之勸勉湯者也言桀以此辭湯曰此君王之士也君王之民也委之何湯不能止桀去也必欲湯曰欲從者從君桀與其属五百人去之地名居南巢湯放桀而復薄三千諸侯大會干薄大㑹湯退再拜從諸侯之位湯曰此天子位有道者可以䖏之有道者讓諸侯之天子非一家之有也有道者之有也故天下者唯有道者理之唯有道者紀之唯有道者宜乆䖏之天子之位乆䖏乆居湯以此讓三千諸侯莫敢即位然後湯即天子之位千三之也諸侯勸與諸侯誓曰隂勝陽即謂之變而天弗施天逆不施道故雌勝雄即謂之亂而人弗行異逆人道故不行雌勝雄女凌男之焉故諸侯之治政在諸侯之大夫治與從上所以教言下必順也治周祝解第六十七曰維哉其時告汝道恐爲身災聞道爲身灾也言所以告汝不讙哉民乎朕則生汝朕則刑汝是以教之以法也告以善道是生之朕則經汝朕則亡汝朕則夀汝朕則名汝汝殺亡汝爲經記汝昌阜汝善惡也汝請命名故曰文之美而以身剥自謂智也者故不足自賢則愚惡返見􅈢貉俱以文受害人角之美殺其牛榮華之言後有茅虚言致穢也言牛以角死凡彼濟者必不怠觀彼聖人必趣時必趣時故聖必不怠故濟石有玉而傷其山萬民之患在口言人以口言受患山以有玉故傷時之行也勤以徙不知道者福爲禍故失其福也不徙以及時人時之徙也勤以行不知道者以福亡時偕行行謂與故曰肥豕必烹甘泉必竭直木必伐人用自以其供理然地出物而聖人是時雞鳴而人爲時觀彼萬且何爲求則之如因雞鳴以識時也萬物自然不爲人來聖人故天有時人以爲正地出利而民是爭爭謂爭其斂之也正謂敬授民時也人出謀聖人是經陳五刑民乃敬敬上命也經經度之也教之以禮民不爭被之以刑民始􅃪因其能民乃靜順靜服謂不爲亂也有禮則讓故不爭聴故􅈢有牙而不敢以噬獂有蚤而不敢以撅小能不喻人以自盡而巳也敢望大官亦求􅀔居小者不能爲大􅀔不便故雖有其材特欲正中不貪其害凡􅀔道者不可以不大正不立不大不貪害也中不行也其度至道故木之伐也而木爲斧賊難而起者自近者因近以成賊因木以伐木二人同術誰昭誰􅊕二虎同穴誰死誰生猛者能生成者能昭故虎之猛也而䧟於􅀗人之智也而䧟於詐欲䧟詐詐罔也虎以食䧟穽人以葉之美也解柯柯之美也離其枝枝之美也抜其本儼矢將至不可以無盾言此喻爲人當有所備䕶飾木業覆本質也盾故澤有獸而焚其草木大威將至不可爲巧焚其草木則無種大威將至不可以爲勇禍至不可救也言亦貨以危身故天之生也固有度國家之患離之以故而起故事也以言患因事地之生也固有植國家之患離之以謀生則立也植立也有故時之還也無私貌日之出也無私照至並應日出普照也還謂至也貌謂無實時時之行也順至無逆爲天下者用大略畧順時也言當以大火之燀也固定上爲天下者用牧上牧爲法也燀然也火曰炎水之流也固走下不善故有桴政由於􅀤者也桴所擊鼓也言惡故福之起也惡别之禍之起也惡别之言其微也惡於何也故平國若之何須國覆國事國孤國屠皆􅀂之何謂無謂屠爲人分裂也覆滅也事謂事無便也孤故日之中也仄月之望也食威之失也隂食陽善爲國者使之有行以日蔽於隂喻君行失道食謂毀明而生魄也仄跌也定彼萬物必有常國君而無道以微亡致滅亡者也㣲以積小以故天爲蓋地爲軫善用道者終無盡地爲軫天爲蓋善用道者終無害靜法天地言用道動天地之間有滄􅀬善用道者終不竭竭盡滄寒陳彼五行必有勝天之所覆盡可稱生成萬物盡可言五行相勝以之也稱名故萬物之所生也性於從萬物之所及也性於同終故曰反也從謂立也始異故惡姑幽惡姑明惡姑隂陽惡姑短長惡姑剛柔易短長之相形剛柔之相生始終之姑者且也言幽明之相伐隂陽之变也道故海之大也而魚何爲可得山之深也虎豹􅆛貅何爲可服自中鈎檻也言皆以貪餌人智之􅃉也奚爲可測跂動噦息而奚爲可牧牽於事故可牧誠於事故可測玉石之堅也奚可刻窮物也言服餙之隂陽之號也孰使之牝牡之合也孰交之君子不察福不來自然也君子察自然之理則福言隂陽之稱號牝牡之交合皆也來故忌而不得是生事故欲而不得是生詐變也生生事謂爲求之詐謂詐欲伐而不得生斧柯欲鳥而不得生網羅欲彼天下是生爲謂云爲之事也所以生成所欲也維彼幽心是生包維彼大心是生雄維彼忌心是生勝雄謂雄桀於人包謂包藏隂謀皆惡忌事也也勝謂勝所忌故天爲高地爲下察汝躬奚爲喜怒天爲古地乆察彼萬物名於始錯推古乆則萬始可言法天地則喜怒無也知左名左右名右視彼萬物數爲紀紀之行也利而無方行而無止以觀人情紀則生利利以利情也名以左右則物以數爲紀利有等維彼大道成而弗攺用彼大道知其極加諸事則萬物服也極中也事業也差等也大道天道用其則必有群加諸物則爲之君􅀋群舉其􅁱則有理加諸物則爲天子長修例也也謂綱周書卷第九
