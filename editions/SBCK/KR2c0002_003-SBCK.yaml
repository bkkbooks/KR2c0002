body:
  text: 晉孔􅄯註明四朙後學章檗校􅈓酆保解二十一大開解二十二小開解二十三文儆解二十四文傅解二十五柔武解二十六大開武解二十七小開武解二十八寶典解二十九酆謀解三十寤敬解三十一武順解三十二武穆解三十三酆保解第二十一維二十三祀庚子朔九州之侯咸格于周王在酆昧爽立于少庭王告周公旦曰嗚呼諸侯咸格來慶辛苦役啇吾何保守何用行旦拜手稽首曰啇爲無道棄徳刑範欺侮群臣辛苦百姓􅃘辱諸侯莫大之綱福其亡亡人惟庸王其祀徳純禮明允無二卑位柔色金聲以合之王乃命三公九卿及百姓之人曰恭敬齊潔咸格而祀于上帝啇饋始于王因饗諸侯重禮庶吏出送于郊樹昏于崇内備五祥六衛七厲十敗四􅁑外用四蠧五落六容七惡五祥一君選擇二官得度三務不舎四不行賂五察民困六衛一明仁懐恕二明智設謀三明武攝勇四明才攝士五明藝法官六明命攝政七厲一翼勤厲務二動正厲民三靜兆厲武四翼藝厲物五翼言厲復六翼敬厲衆七翼知厲道十敗一佞人敗撲二謟言毁積三隂資自舉四女貨速禍五比黨不揀六佞說鬻獄七神􅀛敗􅁲八賔祭推谷九忿言自辱十異姓亂族四􅁑一􅁑其農時不移二費其土慮不化三正賞罰獄無姦奇四􅁑其戎謀族乃不罰四蠧一美好怪奇以治之二􅁋言流說以服之三群巧仍興以力之四神巫􅂕寵以惑之五落一示吾貞以移其名二微䧏霜雪以取松栢三信蟜萌莫能安宅四厚其禱巫其謀乃􅀗五流徳飄狂以明其惡六容一游言二行啇工三軍旅之庸四外風之所􅀭五因失而亡作事􅀿時時乃喪六厚使以徃來其所藏七惡一以物角兵二令美其前而厚其傷三間得大國安得吉凶四交其所親靜之以物則以流其身五率諸侯以朝賢人而巳猶不徃六令之有求遂以生尤七見親所親勿與深謀命友人疑旦拜曰嗚呼王孫其尊天下適無見過過適無好自益以明而迹嗚呼敬哉視五祥六衛七厲十敗四􅁑不修國乃不固務周四蠧五落六容七惡不時不允不率不緩反以自薄嗚呼深念之哉重維之哉不深乃權不重從權乃慰不從乃潰瀆不可復戒後人復戒後人其用汝謀王曰允哉大開解第二十二維王二月旣生魄王在酆立于少庭兆墓九開開厥後人八儆五戒八儆一旦于開二躬修九過三族修九禁四無競維義五習用九敎六用守備七足用九利八寧用懐五戒一祗用謀宗二經内戒工三無逺親戚四雕無薄五禱無憂玉及爲人盡不足王拜儆我後人謀競不可以藏戒後人其用汝謀維􅀫不悉日不足小開解第二十三維三十有五祀王念曰多正月丙子拜望食無時汝開後嗣謀曰嗚呼于來後之人余開在昔曰明明非常維徳曰爲明食無時汝夜何修非躬何慎非言何擇非徳嗚呼敬之哉汝㳟聞不命賈粥不讐謀念之哉不索禍招無曰不免不庸不茂不次人菑不謀迷棄非人朕聞用人不以謀説說惡謟言色不知適適不知謀謀泄汝躬不允嗚呼敬之哉後之人朕聞曰謀有共軵如乃而舎人之好佚而無窮貴而不傲富而不驕兩而不爭聞而不遥逺而不絕窮而不匱者鮮矣汝謀斯何嚮非翼維有共枳枳亡重大害小不堪柯引維徳之用用皆在國謀大鮮無害嗚呼汝何敬非時何擇非徳徳枳維大人大人枳維卿卿枳維大夫大夫枳維士豋豋皇皇枳維國國枳維都都枳維邑邑枳維家家枳維欲無疆動有三極用有九因因有四戚五私極明與與有畏勸汝何異非義何畏非世何勸非樂謀􅀗三極無疆動獲九因無限務用三徳順攻奸言彼翼翼在意􅌇時徳春育生素草肅踈數滿夏育長美柯􅂠務水潦秋􅀄藝不節落冬大劉倍信何謀本時歳至天視嗚呼汝何監非時何務非徳何興非因何用非極維周于民人謀競不可以後戒後戒􅀫不悉日不足文儆解第二十四維文王告夢懼後祀之無保庚辰詔太子發曰汝敬之哉民物多變民何嚮非利利維生痛痛維生樂樂維生禮禮維生義義維生仁嗚呼敬之哉民之適敗上察下遂信何嚮非私私維生抗抗維生奪奪維生亂亂維生亡亡維生死嗚呼敬之哉汝慎守勿失以詔有司夙夜勿忘若民之嚮引汝慎何非遂遂時不逺非本非標非微非煇壤非壤不高水非水不流嗚呼敬之哉倍本者槁汝何葆非監不維一保監順時維周于民之適敗無有時蓋後戒後戒謀念勿擇文傅解第二十五文王受命之九年時維暮春在鄗太子發曰吾語汝所保所守守之哉厚徳廣恵忠信愛人君子之行者四徳君不爲驕侈不爲靡泰不􅁋於美括柱茅茨爲愛費就不决曰括言務儉也因山林非時不升斤斧以成草木之長川澤非時不入網􅅈以成魚鼈之長不麛不卵以成鳥獸之長畈漁以時童不夭胎馬不馳騖土不失宜土言悉長之地所宜土可犯材可蓄潤濕不谷樹之竹􅓗莞蒲礫石不可谷樹之􅁑木以爲絺綌以爲材用不失宜所爲土故凡土地之間者聖人裁之並爲民利是魚鼈歸其泉鳥歸其林不夭胎故取之以時孤寡辛苦咸賴其生長材用得所生山以遂其材工匠以爲其器百物以平其利啇賈以通其貨徳也無二工不失其務農不失其時是謂和徳不失和故土多民少非其土也土少人多非其人也是故土多發政以漕四方四方流之移内人也漕轉流歸言土少安帑而外其務方輸民方輸谷外設業而四夏箴曰中不容利民乃外次也業舎次於田夏禹之箴戒書開望曰土廣無守可襲伐土狹無食可圍竭二禍之來不稱之灾人土相稱爲善也開望古書名也政以天有四殃水旱饑荒其至無時非務積聚何以備之聚谷􅂼積財用夏箴曰小人無兼年之食遇天饑妻子非其有也大夫無兼年之食遇天饑臣妾輿馬非其有也之儲非其有言流亡也古者國家三年必有一年戒之哉弗思弗行至無日矣逺也言不不明開塞禁舎者其如天下何失其機不明謂人各修其學而尊其名聖人制之業用制而故諸横生盡以養從從生盡其養一丈夫夫天子也言兆民者天子也横生萬物也從生人也一丈無殺夭胎無伐不成材無墯四時如此者十年有十年之積者王之計也通三十年有五年之積者覇無一年之積者亡也積也亡爲無國家通計五年之計有五年生十殺一者物十重生一殺十者物頓空十重者王頓空者亡生少到空生多到重兵强勝人人强勝天能制其有者則能制人之有天勝天命勝有不能制其有者則人制之取之術自令行禁止王始也出一曰神明出二曰分光之明光亦明也政有二名分君出三曰無適異出四曰無適與無適與者亡無適與不亡何君臣無適異民也待柔武解第二十六維王元祀一月旣生魄王召周公旦曰嗚呼維在文考之緒功明年春也此文王卒之維周禁五戎五戎不禁厥民乃􅁋五者不禁戎之道也此成周也而謂之戎言一曰王觀幸時政匱不疑二曰獄讐刑蔽奸吏濟貸其貨也濟貸成三曰聲樂飾女滅徳四曰維􅀔是輔維禱是怙五曰盤游安居枝葉維落安居皆害之術輔怙恃盤游五者不距自生戎旅故必以徳爲本以義爲術以信爲動以成爲心以决爲計以節爲勝爲勝距戎之本也言以徳爲本以節務在審時紀綱爲序和均里以匡辛苦苦窮也匡正也辛見宼戚靡適無勝國若化不動金皷善戰不闘故曰柔武四方無拂奄有天下言威也拂違也大明武解第二十七維王一祀二月王在酆宻命謀周大命宻人及啇紂訪於周公旦曰嗚呼余夙夜維啇宻不顯誰和選之啇宻言欲以毀告歲之有秋今余不􅀗其落若何我周不得其落恐將亡和􅂢萬物而啇宻欲擯周公曰茲在徳敬在周其維天命王其敬命在周當言天命而巳敬命逺戚無十和無再失維明徳無佚也再失爲復所親近踈逺也失佚不可還維文考恪勤戰戰何敬何好何惡時不敬殆哉故念文王所敬言一佚不可還王拜曰允哉余聞國有四戚五和七失九因十􅁋非不敬不知知所聞欲知之也言非不欲敬而未今而言維格余非廢善以自塞維明戒是祗至也是而汝格之余敬周公拜曰茲順天天䧏寤于程程䧏因于啇啇今生􅁑􅁑右有周朝生􅁑是祐助周也言天寤周以和啇謀啇維王其明用開和之言言孰敢不格以和則忠告之言無不至可否州濟曰和欲其開臣也四戚一内同外二外婚姻三官同師四哀同勞五和一有天維國二有地維義三同好維樂四同惡維哀五逺方不爭來逺以文徳七失一立在廢二廢在祗三比在門四謟在内五私在外六私在公七公不違所立近公私于錯公法不能違之所謂失廢則功多廢所敬則不見疑比謟九因一神有不饗二徳有所守三才有不官四事有不均五兩有必爭六富有别七貪有匱八好有遂九敵有勝其事而此皆因國也以誤彼十􅁋一􅁋政破國動不時民不保二􅁋好破義言不恊民乃不和三􅁋樂破徳徳不純民乃失常四􅁋動破醜醜不足民乃不讓五􅁋中破禮禮不同民乃不恊六􅁋采破服服不度民乃不順七􅁋文破典典不式敎民乃不􅀋八􅁋權破故故不法官民乃無法九􅁋貸破職百官令不承十􅁋巧破用用不足百意不成嗚呼十􅁋不違危哉今啇維茲行如此十言啇紂所所蔽者之其唯第茲命不承殆哉則危殆也不奉天命若人之有政令廢令無赦乃廢天之命訖文考之功緒忍民之苦不祥父之業忍民患是不祥也廢政令罪不赦而乃廢天命若農之服田務耕而不耨維草其宅之旣秋而不􅀗維禽其饗之人而􅀗飢去誰哀之也已自取之是時矜之父業之遵草居之是農不脩也獸食之是飢王拜曰格乃言嗚呼夙夜戰戰何畏非道何惡非是不敬殆哉爲至故拜也王乃以周公言小開武解第二十八維王二祀一月旣生魄王召周公旦曰嗚呼余夙夜忌啇不知道極敬聽以勤天下周公拜手稽首曰在我文考順明三極躬是四察循用五行戒視七順順道九紀所行之皆文王三極旣明五行乃常四察旣是七順乃辨明􅀔天道九紀咸當順徳以謀罔惟不行道大言化也行三極一維天九星二維地九州三維人四左四方九星禦侮奔走先後是也及五星也四左䟽附四察一目察維極二耳察維聲三口察維言四心察維念必察真僞四者當所五行一黑位水二赤位火三蒼位木四白位金五黄位土順而勤言其所七順一順天得時二順地得助三順民得和四順利財足五順得助明六順仁無失七順道有功天道順道順天時得人功有功得九紀一辰以紀日二􅀫以紀月三日以紀徳四月以紀刑日􅀫次十二紀十二月次日爲禮月爲日月之㑹曰晨甲乙十者於四方以紀也法五春以紀生六夏以紀長七秋以紀殺八冬以紀藏九歲以紀終則成歳四時終時􅀱天視可監時不失以知吉凶視天時天視言王拜曰允哉余聞在昔訓典中規非時罔有格言曰正余不足受謙以寶典解第二十九維王三祀二月丙辰朔王在鄗召周公旦曰嗚呼敬哉朕聞曰何脩非躬躬有四位九徳位九徳也言脩身以四何擇非人人有十姦能免者凡人所不何有非謀謀有十散不圉我哉也圉禁何慎非言言有三信信以生寶寶以貴物物周爲器爲器周用之美好寶物無常維其所貴信無不行周用貴在行之以神振之以寶順之以事明衆以備攺以庸庶格懐患以器用言治實四位一曰定二曰正三曰靜四曰敬敬位丕哉靜乃時非正位不廢定得安宅待時不動丕大也時非九徳一孝子畏哉乃不亂謀二悌悌乃知序序乃倫倫不騰上上乃不崩不相超越不騰不越三􅄌惠茲知長㓜知長㓜樂養老四忠恕是謂四儀風言大極意定不移也儀言五中正是謂權斷補損知選六㳟遜是謂容徳以法從權安上無慝慝惡選數七寛􅊼是謂寛宇准徳以義樂􅀗純嘏謂之大大之福純大也嘏大也八温直是謂明徳喜怒不郄主人乃服也郄問九兼武是謂明刑惠而能􅃘尊天大經九德廣備次世有聲有問長令十姦一窮干靜二酒行干理三辯惠于智四移潔干清五死勇干武多曰移也實少而曰六展允干信七比譽干讓八阿衆干名九專愚干果十愎孤干貞之行故曰姦十者皆不誠十散一廢行乃泄三淺薄間瞞其謀乃􅀗四説咷輕意乃傷營立五行恕而不願弗憂其圖謂聽謀也間瞞不察六極言不度其謀乃費七以親爲踈其謀乃虚八心思慮適百事乃僻九愚而自信不知所守十不釋太約見利忘親十者皆散適單也言成汝三信一春生夏長無私民乃不迷二秋落冬殺有常政乃盛行三人治百物物徳其徳是謂信極信至言其而其余也信旣極矣嗜欲在在不知義欲在美好有義是謂生寶爲寳以義周公拜手稽首興曰臣旣能生寳恐未有子孫其敗子能有以致治也有其心恐有寳而旣能生寶未能生仁恐無後親王寶生之恐失王㑹道維其廢㑹之寶㑹所當王拜曰格而言維時余勸之以安位敎之廣信有徳安位謂用寶而亂亦非我咎上設榮祿不患莫仁以言則用是榮人也榮禄禄仁也仁以愛禄允維典程旣得其禄又增其名上下咸勸孰不競仁維子孫之謀寶以爲常仁言競仁欲愛子孫謀此爲常人以愛禄爲常法則人皆酆謀解第三十維王三祀王在酆謀言告聞也知敵情向人問人日自文王受命至此十年謀告武王也謀以紂聞酆王召周公旦曰嗚呼啇其咸辜維日望謀建功謀言多信今如其何日望以周建功也言啇君臣皆罪周周公曰時至矣乃興師循故至謂循古法言何伐紂之時初用三同一戚取同二任用能三矢無聲以盡心也矢誓言誓衆三讓一近市二賤粥三施資市旅資以惠也以財讓也近來民三虞一邊不侵内二道不毆􅀵三郊不􅅏人禁所以悦也虞禁也設此三王曰嗚呼允從三三無咈厥徵可因言善徴可用以立功也言三讓三同三虞無違與周同愛愛微無疾疾取不取疾至致備惡疾由禱不徳不徳不成害不在小終維實大悔後乃無義神不曲爲非之聽帝念不謟􅀿時作謀不敏殆哉周公曰言斯允格誰從巳出出而不允乃菑也敏疾也帝天也謟僣徃而不徃乃弱士卒咸若周一心心則不時也不徃則是弱一寤敬解第三十一維四月朔王告儆召周公旦曰嗚呼謀泄哉今朕寤有啇驚予所伐故驚言夢爲紂欲與無則欲攻無庸以王不足戒乃不興憂其深矣不從戒中來也戒不興言所憂周公曰天下不虞周驚以寤王王其敬命奉若稽古維王若順虞度克明三徳維則柔正直三徳剛戚和逺人維庸逺人用和近人則攻王禱赦有罪懐庶有茲封福封大庶衆監戒善敗䕶守勿失無虎傅翼將飛入宮擇人而食不驕不恡時乃無敵義也此是王拜曰允哉余聞曰維乃予謀謀時用臧不泄不竭維天而巳天道無窮聞古言也余維與汝監舊之葆咸祗曰後戒維􅀫文戒於心言􅀫古文武順解第三十二右足各履五曰四枝元首曰末元首頭也四枝手足五五二十五曰元卒名伍兵一卒居前曰開一卒居後曰敦啓敦開謂服謂左右一卒曰閭四卒成衛曰伯伯卒名皆陣名三伯一長曰佐三佐一長曰右卒也九伯三右一長曰正三正一長曰卿三卿一長曰辟卿萬卒舉令之於君辟君也此伯卒則右千卒則正三千卒則於伍故不正相當謂諸侯三軍數起辟必明卿必仁正必智右必和其言堪其任也徳如此乃佐必敬伯必勤卒必力故以勇力爲之也卒三十五人之師辟不明無以慮官卿不仁無以集衆伯不勤無以行令卒不力無以承訓謂奉行後令也訓謂先後辟也承均卒力貌而無比則不順同也比者比均伯勤勞而無携携則不和離携均佐和敬而無􅅏􅅏則無成遲留均右肅㳟而無羞羞則不興辟必文聖如度度度功不有差也言聖君有所爲如元忠尚讓親均惠下集固介徳則常在大道也介大也言必所集危言不干徳曰正不犯也不干謂正及神人曰極世世能極曰帝其上極謂武穆解第三十三曰若稽古曰昭天之道熈帝之載揆民之任夷徳之用常夷總之以咸殷等之以禁成之以和盛也皆咸皆殷之也以法總咸康于民卿格維時監于列辟君以爲師也視古公列也敬惟三事永有休哉三事一倡徳二和亂三終齊徳有七倫亂有五遂齊有五備五備一同徃路以揆逺邇二明要醜友徳以衆爾庸三明辟章逺以肅民敎四明義倡爾衆教之以服五要權文徳不畏强寵生同以服先王法服也路謂逺之也教之五遂一道其通一決其壅二絕無赦不疑三挫銳無赦不危四閑兵無用不害五復尊離群不敵不敵也群離故七倫一毀城寡守不路通路二通道不載三小國不凶不伐四正維昌靜不疑五睦􅃘寧于百姓􅃘辱中厚六禁害求濟民七一徳訓民民乃章敎訓明於欽哉欽哉余夙夜求之無射周書卷第三
