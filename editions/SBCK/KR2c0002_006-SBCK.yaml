body:
  text: 晉孔􅄯註朙四明後學章檗校􅈓周月解第五十一時訓解第五十二月令解第五十三謚法解第五十四明堂解第五十五甞麥解第五十六本典解第五十七周月解第五十一惟一月旣南至昏昴畢見日短極基踐長微陽動于黄泉隂慘于萬物是月斗柄建子始昏北指陽氣􅃜草木萌蕩日月俱起于牽牛之􅀄右囬而行月周天起一次而與日合􅀫日行月一次周天歴舎于十有二辰終則復始是謂日月權輿周正歲道數起于時一而成于十次一爲首其義則然凡四時成歳有春夏秋冬各有孟仲季以名十有二月中氣以著時􅀿春三月中氣雨水春分榖雨夏三月中氣小滿夏至大暑秋三月中氣處暑秋分霜䧏冬三月中氣小雪冬至大寒閠無中氣斗指兩辰之間萬物春生夏長秋􅀵冬藏天地之正四時之極不易之道夏􅁆得天百王所同其在啇湯用師于夏除民之災順天革命攺正朔變服殊號一文一質示不相沿以建丑之月爲正易民之視若天時大變亦一代之事亦越我周王致伐于啇攺正異械以垂三綂至於敬授民時廵狩祭享猶自夏焉是謂周月以紀于政時訓解第五十二立春之日東風解凍又五日蟄􅆉始振又五日魚上冰風不解凍號令不行蟄􅆉不振隂姧陽魚不上冰甲胄私藏雨水之日􅆩祭魚又五日鴻鴈來又五日草木萌動􅆩不祭魚國多盗賊鴻鴈不來逺人不服草木不萌動果􅂼不熟驚蟄之日桃始蕐又五日倉庚鳴又五日鷹化爲鳩桃始不蕐是謂陽否倉庚不鳴臣不主鷹不化鳩宼戎數起春分之日玄鳥至又五日雷乃􅀤聲又五日始電玄鳥不至婦人不雷不􅀤聲諸侯民不始電君無威震清明之日桐始蕐又五日田䑕化爲鴽又五日虹始見桐不蕐歲有大寒田䑕不化鴽國多貪殘虹不見婦人苞亂榖雨之日萍始生又五日鳴鳩拂其羽又五日戴勝䧏于桑萍不生隂氣憤􅄹鳴鳩不拂其羽國不治兵戴勝不䧏于桑政教不中立夏之日蝼蟈鳴又五日蚯蚓出又五日王􅆶生蝼蟈不鳴水潦􅁋漫蚯蚓不出嬖奪后王􅆶不生困於百姓小滿之日苦菜秀又五日靡草死又五日小暑至苦菜不秀賢人濳伏靡草不死國縱盗賊小暑不至是謂隂慝芒種之日螳螂生又五日鵙始鳴又五日反舌無聲螳螂不生是謂隂息鵙不始鳴令姧壅偪反舌有聲佞人在側夏至之日鹿角解又五日蜩始鳴又五日半夏生鹿角不解兵革不息蜩不鳴貴臣放逸半夏不生民多厲疾小暑之日溫風至又五日蟋蟀居壁又五日鷹乃學習溫風不至國無寛教蟋蟀不居壁急􅁪之暴鷹不學習不備戎盗大暑之日腐草化爲螢又五日土潤溽暑又五日大雨時行腐草不化爲螢榖實鮮落土潤不溽暑物不􅀿罰大雨不時行國無恩澤立秋之日凉風至又五日白露䧏又五日寒蟬鳴凉風不至無嚴政白露不䧏民多邪病寒蟬不鳴人皆力爭䖏暑之日鷹乃祭鳥又五日天地始肅又五日禾乃豋鷹不祭鳥師旅無功天地不肅君臣乃農不豋榖暖氣爲灾白露之日鴻鴈來又五日玄鳥歸又五日群鳥養羞鴻鴈不來逺人背畔玄鳥不歸室家離散群鳥不養羞下臣驕慢秋分之日雷始􅀵聲又五日蟄􅆉培戸又五日水始涸雷不始􅀵聲諸侯􅁋佚蟄􅆉不培戸靡有頼水不始涸甲􅆉爲害寒露之日鴻鴈來賔又五日爵入大水化爲蛤又五日菊有黄蕐鴻鴈不來小民不服爵不入大水失時之極菊無黄蕐土不稼穡霜䧏之日豹乃祭獸又五日草木黄落又五日蟄􅆉咸俯豺不祭獸爪牙不良草木不黄落是謂愆陽蟄􅆉不咸附民多流亡立冬之日水始冰又五日地始凍又五日雉入大水化爲水不冰是謂隂􅀒地不凍咎徴之咎雉不入大水國多􅁋婦小雪之日虹藏不見又五日天氣上騰地氣下䧏又五日閉塞而成冬虹不藏婦不專一天氣不上騰地氣不下䧏君臣相嫉不閉塞而成冬母后􅁋佚大雪之日鴞鳥不鳴又五日虎始交又五日荔挺生鴞鳥鳴虎不始交荔挺不生卿士專權冬至之日蚯蚓結又五日麋角解又五日水泉動蚯蚓不結君政不行麋角不解兵甲不藏水泉不動隂不承陽小寒之日鴈北向又五日鵲始巢又五日雉始雊鴈不北向民不懐主鵲不始巢國不寧雉不始雊國大水大寒之日鷄始乳又五日鷙鳥厲又五日水澤腹堅雞不始乳􅁋女亂男鷙鳥不厲國不除兵水澤不腹堅言乃不從謚法解第五十四維周公旦太公望開嗣王業攻于牧野之中終葬乃制諡叙法謚者行之迹也號者功之表也車服位之章也善號以爲福也古者有大功則是以大行受大名細行受小名行出於巳名生於人號謚名謂一人無名曰神一善不名稱善簡曰聖得實所别得簡所稱得人所善敬賔厚禮曰聖禮也聖於徳象天地曰帝天地同於靜民則法曰皇安靜仁義所在曰王從民也之立制及衆曰公私也志無執􅀿八方曰侯方􅀿之也所執行八壹徳不解曰蕳委曲壹不平易不疵曰蕳病也疵多經緯天地曰文道也成其道徳博厚曰文知之無不學勤好問曰文下問不耻􅄌恵愛民曰文文也恵以成愍民恵禮曰文安人以禮錫民爵位曰文舉也與可剛彊直理曰武正無曲理忠恕也剛無欲彊不撓直威彊徳曰武者也思有徳克定禍亂曰武故解也以兵征刑民克服曰武能使服法正民大志多窮曰武多所窮也大志行兵敬事供上曰恭也恭奉尊賢貴義曰㳟寵貴義士尊貴賢人尊賢敬譲曰㳟徳譲敬有功有旣過能攺曰㳟智也言有執事堅固曰㳟不移守正安民長悌曰㳟接弟順長執禮敬賔曰㳟賔也迎侍芘親之門曰恭徳無之也以益尊長讓善曰㳟推於他人不尊巳善淵源流通曰㳟所忌性無也照臨四方曰明照之以明􅉲訴不行曰明故不行逆知之威儀悉備曰欽儀則可象威則可畏大慮靜民曰定恵也思􅀣安民大慮曰定安民以慮安民法古曰定意也不失舊純行不傷曰定一行傷不謀慮不威曰徳相拒也不以威辟地有徳曰襄以義取之甲胄有勞曰襄征伐言成有伐而還曰釐而退知難質淵受諫曰釐能受深故􅄌恵愛親曰釐親族也言周愛博聞多能曰獻不至大雖多能道聰明哲曰獻之聰也有通知温柔聖善曰懿淑也性純五宗安之曰孝宗也五世之恊時肇享曰孝也常如始恊合肇始秉徳不回曰孝而不逆順於徳大慮行節曰孝其節言成執心克荘曰齊齊也能自輔輕供就曰齊而供成也輕有所輔温年好樂曰康年勤好豐事民安樂撫民曰康之虞無四方令民安樂曰樂教之富而安民立政曰成安之政以布徳執義曰穆也穆純中情見貌曰穆路也在敏以敬順曰傾敬順也無所不昭徳有勞曰昭謙也能勞聖文周逹曰昭治也聖文通保民􅂄艾曰胡七十曰艾六十曰􅂄彌年夀考曰胡年也大其彊毅果敢曰剛致果曰毅强於仁義追補前過曰剛補過也勤善以柔德考衆曰靜安也成衆使供巳鮮言曰靜鮮言而正供巳之身寛樂令終曰靜以善自終性寛樂義治而清省曰平之病也無失闕執事有制曰平意也在位平布綱治紀曰平政事施之由義而濟曰景成也用義而布義行綱曰景義也以綱行清白守節曰貞志固也行清白大慮克就曰貞正則不可能大慮非不隱無克曰貞私也坦然無彊以剛果曰威剛也􅆠甚於猛以􅆠果曰威於剛也亦强甚彊毅信正曰威無邪也信正言辟土服逺曰桓人兼也故啟道徳純一曰思徳一也道大而不􅌌兆民曰思而不殺大親民外内思索曰思善也言求追悔前過曰思攺也思而能柔質受課曰恵愛恵以恵能思辯衆曰元有次也别之使各行義說民曰元其義民說始建國都曰元可一始也非善之長主義行徳曰元義以徳政也爲主作兵甲亟作曰荘爲嚴以數征叡通克服曰荘使能通逹也服死於原野曰荘以死難非嚴何屢征伐曰荘之以嚴武而不遂曰荘不成武功克殺東正曰夷任賢也秉正不安心好靜曰夷正也不爽丸幸義􅀭善曰懐以善揚人慈義短折曰懐六十短未三十折未夙夜警戒曰敬思戒敬身夙夜㳟事曰敬事也敬以蒞象方益平曰敬之常而加法以敬也合善法典曰敬以善也非敬何述善不克曰丁成義不能述義不悌曰丁遜順也不悌不有功安民曰烈立功以武秉徳遵業曰烈不堕攺遵世業剛克爲伐曰翼也成功思慮深逺曰翼任能也好逺思剛徳克就曰肅使爲就成其不欲執心决斷曰肅果也言嚴愛民好治曰戴治也好民典禮不塞曰戴死而志成曰􅂕恡命也立志不亂而不損曰􅂕以治不極知􅀑事曰􅂕聰徹也知其能不勤成名曰􅂕見賢思齊本任性不死見􅀑能曰􅂕爲厲有􅀑好祭􅀑神曰􅂕能逺也敬􅀑神不短折不成曰殤大殤也有知而未家短折曰殤室家也未家未不顯尸國曰隱國也以門隱拂不成曰隱攺其性也言其隱拂年中早夭曰悼肆志年不肆行勞祀曰悼祀言不脩徳也縱於心勞於􅁋恐懼從䖏曰悼言從䖏也地不思忘愛曰剌巳暑也忌其愛愎佷遂禍曰剌反是曰佷去諫曰愎外内從亂曰荒家不官不治好樂怠政曰荒故怠政事􅁋於聲色在國逢難曰愍之事也逢兵㓂使民折傷曰愍賊害苛政在國連憂曰愍大喪仍多禍亂方作曰愍動長亂國無政蚤孤短折曰哀者早人事未知㳟仁短折曰哀功未施也體恭質仁蚤孤有位曰幽即位有䘮也而卒壅遏不通曰幽也弱損不動祭亂常曰幽之班易神克威捷行曰魏敏行有威而克威恵禮曰魏敏行也有威而去禮逺衆曰􅌆外則荒政内好多􅁋醜心動懼曰甄也甄積容儀㳟美曰勝行㳟可美有儀可象威徳剛武曰圉御亂患也圉御也能聖善周聞曰宣善事也聞謂所聞治民克盡曰恩恵也克盡無行見中外曰慤如一也言表裏勝敵壮志曰勇勝不照功寧民曰商也明有功狀古述今曰譽人稱言立心能制義曰庶事宜制得好和不爭曰安少斷失在外内貞復曰白始一也正而終不生其國曰聲不攺知而致戮無辜曰厲善人賊良官人􅀿實曰知人也能官凶年無榖曰糠稼穡不務名實不爽曰質􅀿也不爽不悔前過曰戾不攺知而温良好樂曰良好可樂也言人行可怙威肆行曰醜得威肆意勤政無私曰􅀋義所在無私惟好變動民曰躁徙也數移慈和徧服曰順服其慈和言使人皆滿志多窮曰感不足也自足者必危身奉上曰忠勞也險不辭思慮深逺曰翼近於專自任多息政外交曰推恃外也不自明而䟽逺繼曰紹偶得之也非其次苐彰義掩過曰堅前過明義以肇敏行成曰直言不深也始疾行成内外賔服曰止也言以正華言無實曰夸教誨不倦曰長教之以道也愛民在刑曰克齊之以刑道之以政嗇於賜與曰愛恡也言貪逆天虐民曰􅌆而逆天所尊天好廉自克曰節情欲也自節以擇善而從曰比而從之比方善好更攺舊曰易故常變攺名與實爽曰謬而實傷言名美思厚不爽曰愿而得也不差所思貞心大度曰匡正心察也而明隱哀之也施爲文也除爲武也惡除辟地爲襄視逺爲􅁪剛克爲發柔克爲懿履亡爲莊有過爲僖施而不成曰宣恵無内徳曰獻不成也無内徳恵治而生􅌌爲平亂而不損爲􅂕由義而濟爲景失無􅀘則以其明餘皆象也象謂象其事行也以其明所及爲謚和㑹也勤勞也遵循也爽傷也肇始也乂治也康安也怙恃也享祀也胡大也服敗也康順也就㑹也過也錫與也典常也肆施也糠虚也聖也恵愛也綏安也堅長也􅂄彊也考成也周至也懐思也式法也敏疾也捷克也載事也彌乆也明堂解第五十五大維啇紂暴虐晡􅀑侯以享諸侯天下患之四海兆民欣戴文武是以周公相武王以伐紂夷定天下旣克紂六年而武王崩成王嗣㓜弱未能踐天子之位周公攝政君天下弭亂六年而天下大治乃㑹方國諸侯於宗周大朝諸侯明堂之位天子之位􅀒斧扆南面立率公卿士侍于左右三公之位中階之前北面東上諸侯之位阼階之東西面北上諸伯之位西階之西東面北上諸子之位門内之東北面東上諸男之位門内之西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上四塞九之國世告至者􅀿門之外北面東上宗周明堂之位也明堂明諸侯之尊卑也故周公建焉而明諸侯於明堂之位制禮作樂頒度量而天下大服萬國各致其方賄七年致政於成王甞麥解第五十六維四年孟夏王􅀄祈禱于宗廟乃甞麥于太祖是月王命大正正刑書爽明僕告旣駕少祝導王亞祝迎王䧏階即假于大宗小宗少秘于社各牡羊一牡豕三史導王于北階王渉階在東序乃命太史尚太正即居于戸西南向九州伯咸進在中西向宰乃承王中升自客階作筴執筴從中宰􅵽尊中于大正之前太祝以王命作筴筴告太宗王命祕作筴許諾乃北向繇書于内楹之門王若曰宗掩大正昔天之􅀄作二后乃設建典命赤帝分正二卿命􅃖尤于宇少昊以臨四方司上天末成之慶􅃖尤乃逐帝争于涿鹿之河九隅無遺赤帝大懾乃說于黄帝執􅃖尤殺之于中冀以甲兵釋怒用大正順天思序紀于大帝用名之曰絕轡之野乃命少昊請司馬鳥師以正五帝之官故名曰質天用大成至于今不亂其在殷之五子忘伯禹之命假國無正用胥興作亂遂凶厥國皇天哀禹賜以彭夀思正夏略今予小子聞有古遺訓而不述朕文考之言不易予用皇威不忘秪天之明典令我大治用我九宗正州伯教告于我相在大國有殷之辟自其作于古是威厥邑無􅀋于冀州嘉我小國小國其命余克長國王嗚呼敬之哉如木旣顚厥巢其猶有枝葉作休爾弗敬恤爾執以屏助予一人集天之顯亦爾子孫其能常憂恤乃事勿畏多寵無愛乃嚚亦無或刑于鰥寡罪罪恵乃其常無别于民衆臣咸興受太正書乃䧏太史筴形書九篇以升授太正乃左還自兩柱之間箴大正曰欽之哉諸正敬功爾頌審三節無思民因順爾臨獄無頗正刑有掇夫循乃徳式監不逺以有此人保寧爾國克戒爾服世世是其不殆維公咸若太史乃降太正坐舉書乃中䧏再拜稽首王命太史正升拜于上王則退是月士師乃命太宗序于天時祠大暑乃命少宗祠風雨百享士師用受其胾以爲之資邑乃命百姓遂享于富無思民疾供百享歸祭閭率里君以爲之資野宰乃命􅃁邑縣都祠于太祠乃風雨也宰用受其職胾以爲之資采君乃命天御豐穯享祠爲施大夫以爲資威太史乃藏之于盟府以爲歲典本典解第五十七維四月旣生魄王在東宫召公告周公曰嗚呼朕聞武考不知乃問不得乃學俾資不肖永無惑矣命朕不知明徳所則政教所行字民之道禮樂所生非不念而知故問伯父周公􅂯拜稽首曰臣聞之文考能督民過者徳也爲民犯難者武也智能親智仁能親仁義能親義徳能親徳武能親武五者昌于國曰明明能見物高能致物物備咸至曰帝帝鄕在地曰本本生萬物曰世世可則曰至至徳照天百姓驚備有好醜民無不戒顯父豋徳徳䧏則信信則民寧爲畏爲極民無􅁋慝生民知常利之道則國彊序明好醜必固其務均分以利之則民安用以資之則民樂明徳以師之則民讓生之樂之則母之禮也政之教之遂以成之則父之禮也父母之禮以加于民其慈古之聖王樂體其政士有九等皆得其宜曰材多人有八政皆得其則曰禮服士樂其生而務其宜是故奏皷以章樂奏舞以觀禮奏歌以觀和禮樂旣和其上乃不危王拜曰允哉㓜愚敬守以爲本典月令闕周書卷第六
