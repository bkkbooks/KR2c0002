front:
  text: 汲􅃁周書卷苐一
  hash: sha256:9b3ed89c617bc412ee4c68981224035d513da8864b2e8f23eb1af8ce6c27ac46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0002_SBCK_001-1a}
body:
  text: 晉孔􅄯註明四朙後學章檗校刻度訓解第一命訓解第二常訓解第三文酌解第四䊮匡解第五度訓解第一天生民而制其度制法度聖人爲度小大以正權輕重以極朙本末以立中以立中正制法度所立中以補損補損以知足故故知足也損益以中爲爵以明朙等極等尊卑之中也極中也貴賤之極以正民正中外以成命大命成也内外正則正上下以順政政敎順其政以内自邇彌興自逺逺邇備極終也微補在分微在明微分理有明故知精朙王是以敬微而順分分次以知和知和以知樂知樂以知哀哀樂以知慧内外以知人所以知人慧者甚明凡民生而有好有惡小得其所好則喜大得其所好則樂小遭其所惡則憂大遭其所惡則哀之自然言其性凡民之所好惡生物是好死物是惡民至有好而不讓不從其所好必犯法無以事上爭則犯法矣不必讓則爭民至有惡不讓不去其所惡必犯法無以事上徧行於此尚有玩民而况曰以可去其惡而得其所好民能居乎居乎言不能居好惡徧爲兼行好惡也能若不力何以求之爭也言力力爭則力政力政則無讓無讓則無禮無禮雖得所好民樂乎不樂爭則若不樂乃所惡也凡民不忍好惡不能分次堅以次第忍爲持乆不次則奪奪則戰戰則何以養老糿何以救痛疾死喪何以胥役也也胥相明王是以極等以斷好惡敎民次分􅀭舉力竟任壯養老長糿有報長之使相報此謂力竟也壮者任之老者養之幼者民是以胥役也夫力竟非衆不尅衆非和不衆以懷和之衆和非中不立中非禮不慎禮非樂不履明王是以無樂非人無哀非人所哀非人也言明王所樂人是以衆人衆賞多罰少政之美也罰多賞少政之惡也罰多則困賞多則乏乏困無醜敎乃不至所厚醜謂是以民主明醜以長子孫子孫習服鳥獸仁德仁德歸其土宜天時百物行治所生皆行其物土之所宜天時治之初􅊗􅀄哉治化則順是故無順非厲以成順者也明醜以使之所長糿成而生曰順極人大人言使小生其義順之至也皆成其事上之心而命訓解第二天生民而成大命之性命也賢愚自然命司德正之以禍福主司以福無德正以禍也以德爲主有徳正立明王以順之作故順天曰大命有常小命日成成則敬有常則廣廣以敬命則度至于極其人法度至中正也日成日進也如有則夫司徳司義而賜之福禄福禄在人能無懲乎若懲而悔過則度至于極以徳居懲正也息其義身深術夫或司不義而降之禍在人能無懲乎若懲而悔過則度至于極夫民生而醜不明無以明之能無醜乎若有醜而競行不醜則度至于極若道上爲不謂醜者君夫民生而樂生無以榖之能無勸乎若勸之以忠則度至于極忠信也榖善也謂夫民生而惡死無以畏之能無恐乎若恐而承敎則度至于極奉上易教也以死亡恐民使六極旣通六間具塞則六間塞矣六中之道通通道通天以正人正人莫如有極道天莫如無極説之也道謂言道天有極則不威不威則不昭正人無極則不信不信則不行不明政教明王昭天信人以度功地以利之使信人畏天則度至于極夫天道三人道三以立敎言相方天有命有禍有福人有醜有紼絻有斧鉞以人之醜當天之命以紼絻當天之福以斧􅃏當天之禍六方三述其極一也不知則不存行善不知故也一者善之謂也不極命則民堕民墮則曠命曠命以誡其上則殆於亂之極其道殆近此下六極謂行極福則民禄民禄則于善于善則不行善也不行極禍則民􅀑民􅀑則􅁋祭淫祭則罷家且無禍也罷弊其財極醜則民叛民叛則傷人傷人則不義則叛義也民不堪行極賞則民賈其上賈其上則民無讓無讓則不順求其賞也賈賣以功極罰則民多詐多詐則不忠不忠則無報不報巳終上遇其禮凡此六者政之始也明王是故昭命以命之曰大命世罰小命罰身犯小命則罸身遺大命則世受罰福莫大於行義禍莫大於淫祭醜莫大於傷人賞莫大於信義讓莫大於賈上罰莫大於貪詐者㝡大言此六古之明王奉此六者以牧萬民民用而不失其義不失撫之以恵和之以均斂之以哀娛之以樂慎之以禮敎之以藝震之以政動之以事勸之以賞畏之以罰臨之以忠行之以權行之以權權不法忠不忠罰不服賞不從勞事不震政不成有如此時言行權當藝不淫禮有時樂不滿哀不至均不壹恵不忍人凡此物攘之屬也事物恵而不􅃘人人不勝害害不如死則害不知死而猶均一則不和哀至則匱樂滿則茺禮無時則不貴藝淫則害于才政成則不長事震則寡功長不而其功寡矣言近淺也震以賞從勞勞而不至以法從中則賞賞不必中以權從法則行行不必以知權權以知微微以知始始以知終理之相致如此也言事勢之相權物常訓解第三天有常性人有常順順在可變性在不攺變自然故學能故可攺不不攺可因因在好惡好惡生變變習生常常則生醜醜命生德之明醜所以命之則徳生矣雖有天性可因其好惡以變明王於是生政以正之民生而有習有常以習爲常以常爲慎民若生于中習常爲常然故若生于中也習常爲常如性自夫習民乃常爲自血氣始若自其氣血生之始也性本所有而糿小習之明王自血氣耳目之習以明之醜好惡也示之以醜明乃樂義樂義乃至上上賢而不窮肖之人窮謂不哀樂不淫民知其至而至于子孫民乃有古古者因民以順民之有古父敎子子皆有經逺之規謂曰因也教孫故夫民群居而無選爲政以始之始之以古終之以古慎終選行也言政必敬始行古志今政之至也政維今法維古云云頑貪以凝疑意以兩平兩以參參伍以權權􅁆以多多難以允允徳以慎慎微以始而敬終乃不困始之義重明終困在坌誘在王民乃茍茍乃不明哀樂不時四徴不顯六極不服八政不順九徳有奸九奸不遷萬物不至民政之弊吉以坌導夫禮非尅不承非樂不竟民是乏生好惡有四徴喜樂憂哀動之以則發之以文成之以名行之以化化之也以中道六極命聽福賞禍罰六極不嬴無常嬴謂八政和平八政夫妻父子兄弟君臣八政不逆九徳純恪九徳忠信敬剛柔和固貞順順言曰政順政曰遂遂僞曰姧監物在目監聲在耳耳因皆有疑疑言有樞樞動有和和意無等差等等謂萬民無法在赦復在古古者明王奉法以明幽幽王奉幽以廢法奉則一人也而績功不同反故也所行相明王是以敬微而順分文酌解第四民生而有欲有惡有樂有哀有德有則則有九聚徳有五寶哀有四忍樂有三豐惡有二咎欲有一極演廣也其義極有七事咎有三尼豐有三頻忍有四敎寶有五大聚有九酌陳也又敷九酌一取允移人二宗傑以觀三發滯以正民四貸官以屬五人曰必禮六徃來取此七啇賈易資八農人美利九寵可動爲政之事此言所酌親之地也英傑人當五大一大知率謀二大武劒勇三大工賦事四大啇行賄五大農假貸假貸振施者也言之爲謀之即四敎一守之以信二因親就年三取戚免梏四樂生身復年就也免梏無患也尊長年也戚近三頻一曰頻禄質㵒二陰福靈極三􅅏身散真散失也頻數也三尼一除戎咎醜二申親考䟽三假時權要考成也時是也尼是也咎罪也七事一騰咎信志二援㧞瀆謀三聚疑沮事四騰屬威衆五處寛身䧏六陵塞勝備七録兵免戎謂不備兵騰勝也録一極惟事昌道開蓄伐之道開行而征伐之道蓄之也言事事皆以忠政行之則吉昌伐有三穆七信一幹二御三安十二來有此事可也信征伐之道必三穆一絶􅂕破城二筮奇昌爲三􅀛從兆凶正而卜雖從而凶絕神不􅁋祀也不七信一仁之愼散二智之完巧三勇之精富四族之寡賄五啇之淺資六農之少積七貴之爭寵信明之也七者所宜一幹勝權輿無不輿言有權二御一樹恵不二既用茲憂也以巔也既盡爲巳巔三安一定居安帑二貢貴得布三刑罪布財十二來一􅃓二矢歸射可用矢常三輪四輿歸御可用言亦五鮑六魚歸蓄爲資積以七陶八冶歸竈陶冶長也言竈善則九柯十匠歸林匠以爲用林當作材十一竹十二􅓗歸時以來人也取之以時所三穆七信一幹二御三安十二來伐道咸布物無不落落物取配維有永究也究終也落始也數急哉急哉後失時糴匡解第五成年年榖足賔祭以盛足而不奢也言賔客宗廟大馴鍾絕服美義􅁋落􅁋過六馴後皂畜約制供餘子務藝馬約制不常秩皂廐别名畜則藝樹也餘衆也宮室城廓修爲備供有嘉菜於是日滿也爲嘉善屬滿之薑等也年儉榖不足賔祭以中盛無稻梁有黍稷樂唯鍾鼓不服美内無文飾外有祭服三牧五庫補攝不物設也事物相兼凡美不修餘子務穡於是糺秩有事按糺之令年飢則勤而不賔舉祭以薄牲也用下樂無鐘皷凡美禁書不早群車不雕攻兵備不制民利不􅁋治攻征當啇旅以救窮乏聞隨鄕下鬻塾賣鬻分助有匡以綏無者於是救困大荒有禱無祭爲大荒也飢饉師旅國不稱樂企不滿壑刑罰不脩舍用振窮舍用常以振民也不滿壑不于治地君親廵方卿參告糴餘子倅運開口同食民不藏糧曰有匡事名曰有匡也倅副也盡行此俾民畜唯牛羊於民大疾惑殺一人無赦相殺者不赦也雖有凶疾惑而男守疆戎禁不出五庫不膳喪禮無度祭以薄資事戎喪儉也而速喪祭用自守而巳不征伐也禮無樂宮不幃嫁娶不以時賔旅設位有賜合以賔旅隨位賜之不饗燕不以時秋冬也媒氏㑹周書卷第一
