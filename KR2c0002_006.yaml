body:
  text: 晉孔眺注明四明後學章檗校刻周月解第五十一時訓解第五十二月令解第五十三諡法解第五十四明堂解第五十五嘗麥解第五十六本典解第五十七周月解第五十一惟一月既南至昏昴畢見日短極基踐長微陽動于黃泉隂慘于萬物是月斗柄建子始昏北指陽氣虧草木萌蕩日月俱起于牽牛之𥘉右回而行月周天起一次而與日合宿日行月一次周天歷舍于十有二辰終則復始是謂日月權輿周正歲道數起于時一而成于十次一為首其義則然凡四時成歲有春夏秋冬各有孟仲季以名十有二月中氣以著時應春三月中氣雨水春分榖雨夏三月中氣小滿夏至大暑秋三月中氣處暑秋分霜降冬三月中氣小雪冬至大寒閠無中氣斗指兩辰之間萬物春生夏長秋收冬藏天地之正四時之極不易之道夏數得天百王所同其在啇湯用師于夏除民之災順天革命攺正朔變服殊號一文一質示不相沿以建丑之月為正易民之視若天時大變亦一代之事亦越我周王致伐于啇攺正異械以垂三統至於敬授民時巡狩祭享猶自夏焉是謂周月以紀于政時訓解第五十二立春之日東風解凍又五日蟄蟲始振又五日魚上冰風不解凍號令不行蟄蟲不振隂姧陽魚不上冰甲胄私藏雨水之日獺祭魚又五日鴻鴈來又五日草木萌動獺不祭魚國多盜賊鴻鴈不來逺人不服草木不萌動果𬞞不熟驚蟄之日桃始華又五日倉庚鳴又五日鷹化為鳩桃始不華是謂陽否倉庚不鳴臣不主鷹不化鳩寇戎數起春分之日玄鳥至又五日雷乃發聲又五日始電玄鳥不至婦人不雷不發聲諸侯民不始電君無威震清明之日桐始華又五日田鼠化為鴽又五日虹始見桐不華歲有大寒田鼠不化鴽國多貪殘虹不見婦人苞亂榖雨之日萍始生又五日鳴鳩拂其羽又五日戴勝降于桑萍不生隂氣憤盈鳴鳩不拂其羽國不治兵戴勝不降于桑政教不中立夏之日螻蟈鳴又五日蚯蚓出又五日王瓜生螻蟈不鳴水潦淫漫蚯蚓不出嬖奪后王瓜不生困於百姓小滿之日苦菜秀又五日靡草死又五日小暑至苦菜不秀賢人濳伏靡草不死國縱盜賊小暑不至是謂隂慝芒種之日螳螂生又五日鵙始鳴又五日反舌無聲螳螂不生是謂隂息鵙不始鳴令姧壅逼反舌有聲佞人在側夏至之日鹿角解又五日蜩始鳴又五日半夏生鹿角不解兵革不息蜩不鳴貴臣放逸半夏不生民多厲疾小暑之日溫風至又五日蟋蟀居壁又五日鷹乃學習溫風不至國無寬教蟋蟀不居壁急恆之暴鷹不學習不備戎盜大暑之日腐草化為螢又五日土潤溽暑又五日大雨時行腐草不化為螢榖實鮮落土潤不溽暑物不應罰大雨不時行國無恩澤立秋之日涼風至又五日白露降又五日寒蟬鳴涼風不至無嚴政白露不降民多邪病寒蟬不鳴人皆力爭處暑之日鷹乃祭鳥又五日天地始肅又五日禾乃登鷹不祭鳥師旅無功天地不肅君臣乃農不登榖暖氣為災白露之日鴻鴈來又五日玄鳥歸又五日群鳥養羞鴻鴈不來逺人背畔玄鳥不歸室家離散群鳥不養羞下臣驕慢秋分之日雷始收聲又五日蟄蟲培戶又五日水始涸雷不始收聲諸侯淫佚蟄蟲不培戶靡有賴水不始涸甲蟲為害寒露之日鴻鴈來賔又五日爵入大水化為蛤又五日菊有黃華鴻鴈不來小民不服爵不入大水失時之極菊無黃華土不稼穡霜降之日豹乃祭獸又五日草木黃落又五日蟄蟲咸俯豺不祭獸爪牙不良草木不黃落是謂愆陽蟄蟲不咸附民多流亡立冬之日水始冰又五日地始凍又五日雉入大水化為水不冰是謂隂負地不凍咎徴之咎雉不入大水國多淫婦小雪之日虹藏不見又五日天氣上騰地氣下降又五日閉塞而成冬虹不藏婦不專一天氣不上騰地氣不下降君臣相嫉不閉塞而成冬母后淫佚大雪之日梟鳥不鳴又五日虎始交又五日荔挺生梟鳥鳴虎不始交荔挺不生卿士專權冬至之日蚯蚓結又五日麋角解又五日水泉動蚯蚓不結君政不行麋角不解兵甲不藏水泉不動隂不承陽小寒之日鴈北向又五日鵲始巢又五日雉始雊鴈不北向民不懷主鵲不始巢國不寧雉不始雊國大水大寒之日雞始乳又五日鷙鳥厲又五日水澤腹堅雞不始乳淫女亂男鷙鳥不厲國不除兵水澤不腹堅言乃不從諡法解第五十四維周公旦太公望開嗣王業攻于牧野之中終葬乃制諡敘法諡者行之迹也號者功之表也車服位之章也善號以為福也古者有大功則是以大行受大名細行受小名行出於巳名生於人號諡名謂一人無名曰神一善不名稱善簡曰聖得實所别得簡所稱得人所善敬賔厚禮曰聖禮也聖於德象天地曰帝天地同於靜民則法曰皇安靜仁義所在曰王從民也之立制及衆曰公私也志無執應八方曰侯方應之也所執行八一德不解曰蕳委曲一不平易不疵曰蕳病也疵多經緯天地曰文道也成其道德博厚曰文知之無不學勤好問曰文下問不耻慈惠愛民曰文文也惠以成愍民惠禮曰文安人以禮錫民爵位曰文舉也與可剛強直理曰武正無曲理忠恕也剛無欲強不撓直威強德曰武者也思有德克定禍亂曰武故解也以兵征刑民克服曰武能使服法正民大志多窮曰武多所窮也大志行兵敬事供上曰恭也恭奉尊賢貴義曰恭寵貴義士尊貴賢人尊賢敬讓曰恭德讓敬有功有既過能攺曰恭智也言有執事堅固曰恭不移守正安民長悌曰恭接弟順長執禮敬賔曰恭賔也迎侍芘親之門曰恭德無之也以益尊長讓善曰恭推於他人不尊巳善淵源流通曰恭所忌性無也照臨四方曰明照之以明譖訴不行曰明故不行逆知之威儀悉備曰欽儀則可象威則可畏大慮靜民曰定惠也思樹安民大慮曰定安民以慮安民法古曰定意也不失舊純行不傷曰定一行傷不謀慮不威曰德相拒也不以威辟地有德曰襄以義取之甲胄有勞曰襄征伐言成有伐而還曰釐而退知難質淵受諫曰釐能受深故慈惠愛親曰釐親族也言周愛博聞多能曰獻不至大雖多能道聰明哲曰獻之聰也有通知溫柔聖善曰懿淑也性純五宗安之曰孝宗也五世之協時肇享曰孝也常如始協合肇始秉德不回曰孝而不逆順於德大慮行節曰孝其節言成執心克莊曰齊齊也能自輔輕供就曰齊而供成也輕有所輔溫年好樂曰康年勤好豐事民安樂撫民曰康之虞無四方令民安樂曰樂教之富而安民立政曰成安之政以布德執義曰穆也穆純中情見貌曰穆路也在敏以敬順曰傾敬順也無所不昭德有勞曰昭謙也能勞聖文周逹曰昭治也聖文通保民耆艾曰胡七十曰艾六十曰耆彌年夀考曰胡年也大其強毅果敢曰剛致果曰毅強於仁義追補前過曰剛補過也勤善以柔德考衆曰靜安也成衆使供巳鮮言曰靜鮮言而正供巳之身寬樂令終曰靜以善自終性寬樂義治而清省曰平之病也無失闕執事有制曰平意也在位平布綱治紀曰平政事施之由義而濟曰景成也用義而布義行綱曰景義也以綱行清白守節曰貞志固也行清白大慮克就曰貞正則不可能大慮非不隱無克曰貞私也坦然無強以剛果曰威剛也疆甚於猛以疆果曰威於剛也亦強甚強毅信正曰威無邪也信正言辟土服逺曰桓人兼也故啓道德純一曰思德一也道大而不青兆民曰思而不殺大親民外內思索曰思善也言求追悔前過曰思攺也思而能柔質受課曰惠愛惠以惠能思辨衆曰元有次也别之使各行義説民曰元其義民説始建國都曰元可一始也非善之長主義行德曰元義以德政也為主作兵甲亟作曰莊為嚴以數征睿通克服曰莊使能通逹也服死於原野曰莊以死難非嚴何屢征伐曰莊之以嚴武而不遂曰莊不成武功克殺東正曰夷任賢也秉正不安心好靜曰夷正也不爽丸幸義揚善曰懷以善揚人慈義短折曰懷六十短未三十折未夙夜警戒曰敬思戒敬身夙夜恭事曰敬事也敬以蒞象方益平曰敬之常而加法以敬也合善法典曰敬以善也非敬何述善不克曰丁成義不能述義不悌曰丁遜順也不悌不有功安民曰烈立功以武秉德遵業曰烈不墮攺遵世業剛克為伐曰翼也成功思慮深逺曰翼任能也好逺思剛德克就曰肅使為就成其不欲執心決斷曰肅果也言嚴愛民好治曰戴治也好民典禮不塞曰戴死而志成曰靈吝命也立志不亂而不損曰靈以治不極知鬼事曰靈聰徹也知其能不勤成名曰靈見賢思齊本任性不死見鬼能曰靈為厲有鬼好祭鬼神曰靈能逺也敬鬼神不短折不成曰殤大殤也有知而未家短折曰殤室家也未家未不顯尸國曰隱國也以門隱拂不成曰隱攺其性也言其隱拂年中早夭曰悼肆志年不肆行勞祀曰悼祀言不修德也縱於心勞於淫恐懼從處曰悼言從處也地不思忘愛曰剌巳暑也忌其愛愎佷遂禍曰剌反是曰佷去諫曰愎外內從亂曰荒家不官不治好樂怠政曰荒故怠政事淫於聲色在國逢難曰愍之事也逢兵寇使民折傷曰愍賊害苛政在國連憂曰愍大喪仍多禍亂方作曰愍動長亂國無政蚤孤短折曰哀者早人事未知恭仁短折曰哀功未施也體恭質仁蚤孤有位曰幽即位有喪也而卒壅遏不通曰幽也弱損不動祭亂常曰幽之班易神克威捷行曰魏敏行有威而克威惠禮曰魏敏行也有威而去禮逺衆曰煬外則荒政內好多淫醜心動懼曰甄也甄積容儀恭美曰勝行恭可美有儀可象威德剛武曰圉御亂患也圉御也能聖善周聞曰宣善事也聞謂所聞治民克盡曰恩惠也克盡無行見中外曰慤如一也言表裏勝敵壯志曰勇勝不照功寧民曰商也明有功狀古述今曰譽人稱言立心能制義曰庶事宜制得好和不爭曰安少斷失在外內貞復曰白始一也正而終不生其國曰聲不攺知而致戮無辜曰厲善人賊良官人應實曰知人也能官凶年無榖曰粳稼穡不務名實不爽曰質應也不爽不悔前過曰戾不攺知而溫良好樂曰良好可樂也言人行可怙威肆行曰醜得威肆意勤政無私曰類義所在無私惟好變動民曰躁徙也數移慈和遍服曰順服其慈和言使人皆滿志多窮曰感不足也自足者必危身奉上曰忠勞也險不辭思慮深逺曰翼近於專自任多息政外交曰推恃外也不自明而疏逺繼曰紹偶得之也非其次苐彰義掩過曰堅前過明義以肇敏行成曰直言不深也始疾行成內外賔服曰止也言以正華言無實曰夸教誨不倦曰長教之以道也愛民在刑曰克齊之以刑道之以政嗇於賜與曰愛吝也言貪逆天虐民曰煬而逆天所尊天好廉自克曰節情欲也自節以擇善而從曰比而從之比方善好更攺舊曰易故常變攺名與實爽曰謬而實傷言名美思厚不爽曰願而得也不差所思貞心大度曰匡正心察也而明隱哀之也施為文也除為武也惡除辟地為襄視逺為恆剛克為發柔克為懿履亡為莊有過為僖施而不成曰宣惠無內德曰獻不成也無內德惠治而生青為平亂而不損為靈由義而濟為景失無輔則以其明餘皆象也象謂象其事行也以其明所及為諡和會也勤勞也遵循也爽傷也肇始也乂治也康安也怙恃也享祀也胡大也服敗也康順也就會也過也錫與也典常也肆施也粳虛也聖也惠愛也綏安也堅長也耆強也考成也周至也懷思也式法也敏疾也捷克也載事也彌久也明堂解第五十五大維啇紂暴虐晡鬼侯以享諸侯天下患之四海兆民欣戴文武是以周公相武王以伐紂夷定天下既克紂六年而武王崩成王嗣幼弱未能踐天子之位周公攝政君天下弭亂六年而天下大治乃會方國諸侯於宗周大朝諸侯明堂之位天子之位負斧扆南面立率公卿士侍于左右三公之位中階之前北面東上諸侯之位阼階之東西面北上諸伯之位西階之西東面北上諸子之位門內之東北面東上諸男之位門內之西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上四塞九之國世告至者應門之外北面東上宗周明堂之位也明堂明諸侯之尊卑也故周公建焉而明諸侯於明堂之位制禮作樂頒度量而天下大服萬國各致其方賄七年致政於成王嘗麥解第五十六維四年孟夏王𥘉祈禱于宗廟乃嘗麥于太祖是月王命大正正刑書爽明僕告既駕少祝導王亞祝迎王降階即假于大宗小宗少祕于社各牡羊一牡豕三史導王于北階王涉階在東序乃命太史尚太正即居于戶西南向九州伯咸進在中西向宰乃承王中升自客階作策執策從中宰􅵽尊中于大正之前太祝以王命作策策告太宗王命祕作策許諾乃北向繇書于內楹之門王若曰宗掩大正昔天之𥘉作二后乃設建典命赤帝分正二卿命蚩尤于宇少昊以臨四方司上天末成之慶蚩尤乃逐帝爭于涿鹿之河九隅無遺赤帝大懾乃説于黃帝執蚩尤殺之于中冀以甲兵釋怒用大正順天思序紀于大帝用名之曰絶轡之野乃命少昊請司馬鳥師以正五帝之官故名曰質天用大成至于今不亂其在殷之五子忘伯禹之命假國無正用胥興作亂遂凶厥國皇天哀禹賜以彭夀思正夏略今豫小子聞有古遺訓而不述朕文考之言不易豫用皇威不忘秪天之明典令我大治用我九宗正州伯教告于我相在大國有殷之辟自其作于古是威厥邑無類于冀州嘉我小國小國其命余克長國王嗚呼敬之哉如木既顚厥巢其猶有枝葉作休爾弗敬恤爾執以屏助豫一人集天之顯亦爾子孫其能常憂恤乃事勿畏多寵無愛乃嚚亦無或刑于鰥寡罪罪惠乃其常無别于民衆臣咸興受太正書乃降太史策形書九篇以升授太正乃左還自兩柱之間針大正曰欽之哉諸正敬功爾頌審三節無思民因順爾臨獄無頗正刑有掇夫循乃德式監不逺以有此人保寧爾國克戒爾服世世是其不殆維公咸若太史乃降太正坐舉書乃中降再拜稽首王命太史正升拜于上王則退是月士師乃命太宗序于天時祠大暑乃命少宗祠風雨百享士師用受其胾以為之資邑乃命百姓遂享于富無思民疾供百享歸祭閭率里君以為之資野宰乃命冡邑縣都祠于太祠乃風雨也宰用受其職胾以為之資采君乃命天御豐穯享祠為施大夫以為資威太史乃藏之于盟府以為歲典本典解第五十七維四月既生魄王在東宫召公告周公曰嗚呼朕聞武考不知乃問不得乃學俾資不肖永無惑矣命朕不知明德所則政教所行字民之道禮樂所生非不念而知故問伯父周公再拜稽首曰臣聞之文考能督民過者德也為民犯難者武也智能親智仁能親仁義能親義德能親德武能親武五者昌于國曰明明能見物高能致物物備咸至曰帝帝鄉在地曰本本生萬物曰世世可則曰至至德照天百姓驚備有好醜民無不戒顯父登德德降則信信則民寧為畏為極民無淫慝生民知常利之道則國強序明好醜必固其務均分以利之則民安用以資之則民樂明德以師之則民讓生之樂之則母之禮也政之教之遂以成之則父之禮也父母之禮以加于民其慈古之聖王樂體其政士有九等皆得其宜曰材多人有八政皆得其則曰禮服士樂其生而務其宜是故奏鼓以章樂奏舞以觀禮奏歌以觀和禮樂既和其上乃不危王拜曰允哉幼愚敬守以為本典月令闕周書卷第六
