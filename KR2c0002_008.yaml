body:
  text: 晉孔眺注明四明後學章檗校刻祭公解第六十史記解第六十一職方解第六十二祭公解第六十王若曰祖祭公穆於穆王在祖列祭公周公之後昭次豫小子虔虔在位敬虔昊天疾威豫多時溥愆於我故多是過失溥大也言昊天疾威我聞祖不豫有加豫惟敬省不弔天降疾病豫畏之威公其告豫懿德下疾王畏守不美懿美也弔至也言巳道不至故天祭公拜手稽首曰天子稽首頭俯地拜手頭至手謀父疾維不瘳朕身尚在茲朕魂在于天在於天言必死也謀父祭公名我魂昭王之所朂宅天命所勉君天下之士也言雖魂在天猶明王之王曰嗚呼公朕皇祖文王烈祖武王度下國作陳周維皇皇上帝度其心置之明德所能置明德於其身也下國謂諸侯也天度其心付俾於四方用應受天命敷文在下敷其文德在下土也付與四方受命於天而我亦維有若文祖周公暨列祖召公茲申豫小子追學於文武之蔑此由周召分治之化也言巳追學文武之徴德周克龕紹成康之業以將天命用夷居之大啇之衆大啇本其𥘉也將行夷平也言我亦維有若祖祭公之執和周國保乂王家其政也執謂執王曰公稱丕顯之德以豫小子揚文武大勳弘成康昭考之烈昭王穆王之父也稱謂舉行也昭考王曰公無困我哉俾百僚乃心率輔弼豫一人輔弼我不然則困我言公當使百官相率和祭公拜手稽首曰允乃詔畢桓于黎民般民樂政也乃汝汝王也般樂也言信如王告盡治公曰天子謀父疾維不瘳敢告天子皇天攺大殷之命維文王受之維武王大尅之咸茂厥功王以受命茂美也文為美故曰咸也為美武王以尅殷維天貞文王之重用威亦尚寬壯厥心康受乂之式用休既尅之而安受治之其治用貞正也重之用威伐崇黎也也美亦先王茂綏厥心敬恭承之維武王申大命戡厥敵命之意而勝殷也言武王申文王受公曰天子自三公上下辟于文武文武之子孫大開方封于下土文武方大開國旁辟法也言我上法下土布於天之所錫武王時疆土丕維周之后稷之受命是永宅之維周之開基大維后稷所受命是錫與言天豫武王是疆所受是大此也長居維我後嗣旁建宗子丕維周之始并立為諸侯旁建宗子子之故也言皆始并天嗚呼天子三公監于夏商之既敗丕則無遺後難至于萬億年守序終之大無後難之道守言當夏商以為戒終也其序而既畢丕乃有利宗丕維文王由之有利于宗既終之則之德也皆由文武公曰嗚呼天子我不則寅哉寅哉不則言寅敬也也則汝無以戾罪疾喪時二王大功所行也是二王戾反罪疾謂巳武文汝無以嬖御固莊后也固戾也嬖御寵妾汝無以小謀敗大作也大作大事也小謀不法先王汝無以嬖御士疾大夫卿士親小言無君子人疾汝無以家相亂王室而莫恤其外命恤憂也外言倍臣執國之外也謂王室尚皆以時中乂萬國道治天下也言當盡用是中嗚呼三公汝念哉汝無泯泯芬芬厚顔忍醜時維大不弔哉亂則厚顔忍醜也如是則大不善者也戒三公使念我與王也泯芬亂也忍行昔在先王我亦維丕以我辟險于難不失于正我亦以免沒我世遇大難險而不失故能以善沒世言善終先王穆父祭公所事也辟君也言我事先王嗚呼三公豫維不起朕疾汝其皇敬哉茲皆保之當式敬我皇大也言下皆安之言如此則天曰康子之攸保朂教誨之世祀無絶不我周有常刑之則子孫有福不然則犯常刑也康安也子之所宜安以善道勉教王拜手稽首黨言三拜則三公拜可知也王拜受祭公之黨言也史記解第六十一維正月王在成周昧爽召三公左史戎夫也戎夫左王是穆王也史名曰今夕朕寤遂事驚豫驚夢宿欲知之也遂成也行成事言乃取遂事之要戒俾戎夫言之朔望以聞月朔日望於王集取要戒之言之前讀信不行義不立則哲士凌君政信義由智立故言君不行信義之政也哲士凌君禁而生亂皮氏以亡皮氏古諸侯也禁信義則亂生諂諛日近方正日逺則邪人專國政為諂諛好順人意禁而生亂華氏以亡古諸侯也華聚也亦好貨財珍怪則邪人進邪人進則賢良日蔽而逺貨故蔽逺賢良不行賞罰無位隨財而行夏后氏以亡財亡也桀由好嚴兵而不者其臣懾其臣懾而不敢忠不敢忠則民不親其吏效其上故不親不敢忠乃不仁下刑始於親逺者寒心殷商以亡虐亡也紂以暴樂專於君者權專於臣權專於臣則刑專於民専斷用刑濫矣君荒於樂則權臣君娛於樂臣爭於權民盡於刑有虞氏以亡而刑殺之專則致爭虞商均之後盡被刑也有奉孤以專命者謀主必畏其威而疑其前事也前事謂專命謀主謂孤長大挾德而責數日疏位均而爭平林以亡事此與周公反矣位於勢敵挾其見奉之德而責其前專命大臣有錮職譁誅者危昔者質沙三卿朝而無禮君怒而久拘之譁而弗加專權也錮職謂事譁卿謀變質沙以亡侯可知也有三卿諸外內相間下撓其民民無所附三苗以亡弱小在強大之間存亡將由之則無天命矣不知命者死命命無天不知命則足以亡矣在疆壯者也知命則大有夏之方興也扈氏弱而不恭身死國亡於甘威扈也有夏啓也戰嬖子兩重者亡昔者義渠氏有兩子異母皆重而寵秩同王不别長庶君疾大臣分黨而爭義渠以亡而爭力也各有所事功大不賞者危昔平州之功大而不賞諂臣日賞貴功日怒而生變平州之君以走出官而任姧佞宜其走也有功不賞而貴諂臣有德不召逺不親者危昔有林氏召離戎之君而朝之諸侯林氏至而不禮留而弗親離戎逃而去之林氏誅之天下叛林氏遇戎不以天下見其林氏孤危也禮遂叛林氏昔者曲集之君伐智而專事疆力而不賤其臣良皆伏謂不為之用伐智自足也愈州氏伐之君孤而無使曲集以亡皆古諸侯曲集愈州昔者有巢氏有亂臣而貴任之以國假之以權擅國而主斷政也委之君巳而奪之臣怒而生變有巢以亡奪其政懼禍見及故作亂也秉正則專立殺則多恐雖君斧小不勝柯者亡昔有鄶君嗇儉滅爵損祿群臣卑讓上下不臨爵祿君所以任不臨言不相承奉也柯秉所以喻君斧所以用喻臣臣無後小弱禁罰不行重氏伐之鄶君以亡能行令兩弱不久空重位者危昔有共工自賢自以無臣久空大官任巳言無空官也臣者故下官交亂民無所附唐氏伐之共工以亡大無亂於下民無所依堯遂流之臣故小臣亂也君凶於上臣犯難爭權疑者死昔有林氏上衡氏爭權不果為疑爭為犯難林氏再戰弗勝上衡氏偽義弗克俱身死國亡怠義所以俱亡林氏恃勝上衡氏知能均而不親並重事君者危昔有南氏有二臣貴寵力鈞勢敵竟進爭權下爭朋黨君弗禁南氏以分而不親權二臣勢鈞以分國也重養徒黨所昔有果氏好以新易故故者疾怨新故不和國名也有果亦內爭朋黨隂事外權有果氏以亡謂外外權國大爵重祿輕比不成者亡昔有畢程氏損祿增爵群臣貌匱比而戾民畢程氏以亡成民不堪求比而有位無祿取名自之罪好變故易常者亡昔陽氏之君自伐而好變事無故業官無定位民運於下移也運亂陽氏以亡業形而愎者危昔谷平之君愎類無親破國弗克業形相國佷愎彼以形為業也類戾也國不勝外內相援谷平以亡武不止者亡昔阪泉氏用兵無巳誅戰不休并兼無親文無所立智士寒心文德故智士寒心也無親謂并兼之也無徙居至于獨鹿諸侯畔之阪泉以亡都失處故亡也獨鹿西戎地名徙佷而無親者亡昔者縣宗之君佷而無聽忠言不納執事不從宗職者疑發大事群臣解體違心皆有國無立功縣宗以亡昔者玄都賢鬼道廢人事天神也求祥謀臣不用龜䇿是從神巫用國哲士在外玄都以亡所以亡也棄賢任巫文武不行者亡昔者西夏性仁非兵非兵而無武備性仁而無文德城郭不修武士無位惠而好賞屈而無以賞財無可用無功盡賞唐氏伐之城郭不守武士不用西夏以亡堯帝唐氏美女破國昔者績陽疆力四征重丘遺之美女并巳惑之以女重丘之君畏其績陽之君悅之熒惑不治大臣爭權逺近不相聽國分為二於上君昏所為二也權分於下宫室破國昔者有洛氏宮室無常池囿廣大工功日進以後更前民不得休農失其時則民困工功進賢材退矣矣以工取官飢饉無食成啇伐之有洛以亡成故曰湯號曰湯成職方解第六十二職方氏掌天下之圖辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民使有司抄出之欲時省焉國此在周官大司馬下篇穆王貉夷之别八七九五六見非一之言也邑曰鄙東方曰夷南方曰蠻皆狄蠻之别與其財用九谷六蓄之數周知其利害乃辨九州之國使同貫利事貫東南曰揚州其山鎮曰會稽其藪澤曰其區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜雞犬鳥獸其榖宜民男女各不同鳥獸山澤竹箭藤篠也九州土氣生之屬所育正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸頴湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻河南曰豫州其山鎮曰華山其澤藪曰圃田其川熒雒其浸陂溠西嶽華山其利林漆絲枲其民二男三女其畜宜六擾其榖宜五種曰擾五家所畜菽麥稻也種謂黍稷正東曰青州其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沐其利蒲魚其民二男三女其畜宜雞犬其榖宜稻麥河東曰兖州其山鎮曰岱山其澤藪曰大野其川河沛其浸盧維其利蒲魚其民二男三女其畜宜六擾其榖宜四種稷稻麥四種黍正西曰雍州其山鎮曰嶽山其澤藪曰疆蒲其川涇汭其浸渭洛其利玉石其民三男二女其畜牛馬其榖宜黍稷嶽也嶽異東北曰幽州其山鎮曰醫無閭其澤藪曰貕養其川河沛其浸災時其利魚鹽其民一男三女其畜宜四擾其榖宜三種三種黍稻稷也四擾牛馬羊豕河內曰冀州其山鎮曰霍山其澤藪曰楊紆其川漳其浸汾露其利松柏其民五男二女其畜宜牛羊其榖宜黍稷謂所者河內正北曰並州其山鎮曰恆山其澤藪曰昭餘祁其川呼池嘔夷其浸淶易其利布帛其民二男三女其畜宜五擾其榖宜五種五種黍稷菽麥麻五擾牛馬羊豕犬乃辨九服之國方千里曰王圻也圻界其外方五百里為侯服言服正事也為王者斥候也又其外方五百里為甸服田又入榖甸田也治也又其外方五百里曰男服任王事男任也又其外方五百里為衛服衛也為王扞又其外方五百里曰蠻服蕳慢用事差又其外方五百里為鎮服又其外方五百里為藩服四境也藩服屏凡國公侯伯子男以周知天下凡拜國大小相維王設其教牧御天下之政教周遍維持也牧謂制其職名以其所能各任能也連率牧監制其貢各以其所有乃貢之土地所有王將巡狩則戒于四方曰各修平乃守考乃職事無敢不敬戒國有大刑大刑也職方所考成也不敬則犯及王者之所行道率其屬而巡戒命王殷國亦如之巡狩職方自王十二歲一謂之殷國也述命亦如巡狩也所戒之命其不巡狩六服盡朝朝周書卷第八
