body:
  text: 刻汲冡周書䟦汲冡周書自漢巳入中秘晉太康間竹簡古書稍稍復岀云書疑戰國士綴拾成之藉周爲名孔氏殆未之見者凡七十篇眞贋醇駁讀者類能辨之然藝圃菁蕐芬芳縟采上遡二京而先秦七國則斯編也其逸響高韻之存乎余念莆爲書學淵藪以手抄善本刻此俾誦者知爲經之别録俱不可捐爾峕嘉靖癸丣長至月吉旦賜進士福建興化府推官前山西道監察御史四朙後學章檗謹䟦
