body:
  text: 刻汲冡周書跋汲冡周書自漢巳入中祕晉太康間竹簡古書稍稍復出云書疑戰國士綴拾成之藉周為名孔氏殆未之見者凡七十篇真贋醇駁讀者類能辨之然藝圃菁華芬芳縟采上遡二京而先秦七國則斯編也其逸響高韻之存乎余念莆為書學淵藪以手抄善本刻此俾誦者知為經之别録俱不可捐爾峕嘉靖癸丣長至月吉旦賜進士福建興化府推官前山西道監察御史四明後學章檗謹跋
