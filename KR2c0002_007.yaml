front:
  text: 周書卷第七
  hash: sha256:7cb6fd7e13a0d0a16867d453526cfd1bbb3e916ff6ce3b88990e80e164401f9e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0002_SBCK_007-1a}
body:
  text: 晉孔眺注明四明後學章檗校刻官人解第五十八王會解第五十九官人解第五十八王曰嗚呼大師朕惟民務官論用有徴觀誠考言視聲觀色觀隱揆德可得聞乎周公曰亦有六徴嗚呼乃齊以揆之一曰富貴者觀其有禮施貧賤者觀其有德守嬖寵者觀其不驕奢隱約者觀其不懾懼其少者觀其恭敬好學而能悌其壯者觀其廉潔務行而勝私其老者觀其思慎而強其所不足者觀其不愈父子之間觀其和友君臣之間觀其忠惠鄉黨之間觀其誠信省其居處觀其方省其喪哀觀其貞良省其出入觀其交友省其交友觀其任廉設之以謀以觀其智示之以難以觀其勇煩之以事以觀其治臨之以利以觀其不貪濫之以樂以觀其不荒喜之以觀其輕之以觀其重醉之酒以觀其恭從之色以觀其常逺之以觀其不二昵之以觀其不狎復徴其言以觀其精曲省其行以觀其備此之謂觀誠二曰方與之言以觀其志以淵其器寬以悌其色儉而不諂其禮先人其言後人見其所不足曰益者也好臨人以色高人以氣賢人以言防其所不足發其所能曰損者也其貌直其言正而不私不飾其美不隱其惡不防其過曰有質者也其貌曲媚其言工巧飾其見物務其小證以故自説曰無質者也喜怒以物其色不變煩亂以事而志不營深導以利而心不移臨懾以威而氣不卑曰平心而固守者也喜怒以物而心變易煩亂以事而志不治導之以利而心遷移臨懾以威而氣惵懼曰鄙心而假氣者也設之以物而數決敬之以卒而度應不文而辨曰有慮者也難決以物難悅以守一而不可變因而不知止曰愚依人也營之以物而不誤犯之以卒而不懼置義而不可遷臨之貨色而不過曰果敢者也移易以言志不能固巳諾無決曰弱志者也順豫之弗為喜非奪之弗為怒沉靜而寡言多稽而險貌曰質靜者也屏言弗顧自順而弗護非是而強之曰始誣者也微而能發察而能深寬順而恭儉溫柔而能斷果敢而能屈曰志治者也華廢而誣巧言令色皆以無為有者也此之謂考言三曰誠在其中必見諸外以其聲處其實氣𥘉生物物生有聲聲有剛柔清濁好惡咸發于聲心氣華設者其聲流散心氣順信者其聲順節心氣鄙戾者其聲醒醜心氣寬柔者其聲溫和信氣中易義氣時舒和氣蕳備勇氣壯力聽其聲處其氣考其所為觀其所由以其前觀其後以其隱觀其顯以其小占其大此之謂視聲四曰民有五氣喜怒欲懼憂喜氣內蓄雖欲隱之陽喜必見怒氣內蓄雖欲隱之陽怒必見欲氣懼氣憂悲之氣皆隱之陽氣必見五氣誠于中發形于外民情不可隱也喜色猶然以出怒色薦然以侮欲色嫗然以愈懼色薄然以下憂悲之色瞿然以靜誠智必有難盡之色誠仁必有可尊之色誠勇必有可新之色誠潔必有難汙之色誠必有可信之色質浩然固以安偽蔓然亂以煩雖欲攺之中色弗聽此之謂觀色五曰民生則有隂有陽人多隱其情飾其偽以攻其名有隱於仁賢者有隱於智理者有隱於文藝者有隱於廉勇者有隱於交友者如此不可不察也小施而好德小讓而爭大言願以為質愛以為忠尊其得以攺其名如此隱於仁賢者也前總唱功慮誠弗及佯為不言內誠不足色示有餘自順而不讓措辭而弗遂此隱於智理者也動人以言竭而弗終問則不對佯為不窮貌而有餘假道而自順因之初窮則託深如此者隱於文藝者也言以為廉矯厲以為勇內恐外誇亟稱其説以詐臨人如此隱於廉勇者也自事其親而好以告人飾其見物不誠於內發名以事親自以名私其身如此隱於忠孝者也比周以相譽知賢可徴而左右不同不同而交交必重心説而身弗近而實不至懼不盡見於衆而貌克如此隱於交友也此之謂觀隱六曰言行不類終始相悖外內不合雖有假節見行曰非成質者也言忠行夷爭靡及私弗求及情忠而寬貌莊而安曰有仁者也事變而能治效窮而能逹措身立方而能遂曰有知者也少言以行恭儉以讓有知而言弗發有施而弗德曰謙良者也微忽之久而可復幽間之獨而弗克其行亡如存曰順信者也貴富恭儉而能施嚴威有禮而不驕曰有德者也隱約而不懾安樂而不奢勤勞而不變喜怒而有度曰有守者也直方而不毀廉潔而不戾強立而無私曰有經者也虛以待命不召不至不問不言言不過行行不過道曰沈靜者也忠愛以事親歡以盡力而不回敬以盡力而不曰忠孝者也合志而同方共其憂而任其難行忠信而不疑隱逺而不舍曰友者也志色亂氣其人甚偷進退多巧就人甚數辭不至少其所不足謀而不巳曰偽詐者也言行亟變從容克易好惡無常行身不篤曰無誠者也少知而不大決少能而不大成規小物而不知大倫曰華誕者也規諫而不髏道行而不平曰竊名者也故曰事阻者不夷時者不回果敢者也飾貌者不靜假節者不平多私者不義揚言者寡信此之謂揆德王會解第五十九成周之會墠上張赤奕隂羽四夷也隂鶴也以羽飾王城既成大會諸侯及墠奕帳也帳也除地曰天子南面立絻無繁露朝服八十物搢挺八十物大小所服搢插挺笏也繁露冕之所垂也所尊敬則有焉唐叔荀叔周公在左太公望在右皆絻亦無繁露朝服七十物搢笏旁天子而立於堂上差在後也近天子后故其冕謂唐荀國名皆成王弟故曰叔旁旒也亦無堂下之右唐公虞公南面立焉堯舜後也唐虞二公堂下之左殷公夏公立焉皆南面絻有繁露朝服五十物皆搢笏搢笏則唐虞闕也杞宋二公冕有繁露為諸侯之有疾病者阼階之南祝淮氏榮氏次之皆西南彌宗旁之祝之氏淮榮二圭瓉南差在後也彌宗官名次為諸侯有疾病者之醫藥所居左右使諸至也也居則相者太史魚大行人皆朝服有繁露名及太魚太史賔客禮儀也行人皆贊相堂下之東面郭叔掌為天子菉幣焉絻有繁露録諸侯之幣也郭叔虢文王弟菉內臺西面者正北方應侯曹叔伯舅中舅應侯成王弟內臺中臺也比服次之要服次之荒服次之西方東面正北方伯父中子次之比服轉逺此要服於姬姓之國中子於王子中行者也殊故殊其名非夷狄之四荒也伯父方千里之外為比服方千里之內為要服三千里之內為荒服是皆朝於內者殷非周制也此服名因於堂後東北為赤奕焉浴盆在其中之敬諸侯也雖不用而設其西天子車立馬乘亦青隂羽鳬旌為旌旄鶴鳬羽中臺之外其右泰士臺右彌士東西也外外謂臺之尊王太彌相儀之事也臺右太士右彌士士言受贄者八人東面者四人賔受則西面四人也幣士也四人東面陳幣當外臺天玄宗馬十二束陳玄黑宗尊也帛𬒳馬於外臺天王玄繚碧基十二故自下以至王此下三碧皆玉基玉名有十二基也之玄繚謂之黑組紐之參方玄繚璧豹虎皮十二方參璧皮兼陳也陳幣三所也四方玄繚璧琰十二之四方所列之也琰圭也有鋒疾陳外臺之四隅張赤奕為諸侯欲息者皆息焉命之曰爻閭近也侯稱爻也每角張息者隨所周公旦主東方所之青馬黑謂之母兒青馬則西白馬矣馬名未聞周公主東方則太公主西方東其守營牆者衣青操弓執矛異方戟也各西面者正北方稷慎大大蛤也在越文蜃共人玄貝玄貝照貝也共人吳越之蠻海陽大蟹之陽海水盈車一蟹自深桂南蠻也自深亦會稽以􅥜皆西嚮鼓首自塵以其皮可以為向西也下至此正北方義渠以茲白茲白者若白馬鋸牙食虎豹西戎國茲白一名駮者也亦在臺北與大塵相對義渠史林以尊耳尊耳者身若虎豹尾長三尺其身食虎豹在西南者史林戎之北唐戎以閭閻以隃冠射禮以閭象為射器北唐戎在西北者也渠叟以䶂犬䶂犬者露犬也能飛食虎豹之别名也渠叟西戎樓煩以星施星施者珥旄所以為旄羽耳樓煩北狄珥旄卜盧以羊羊者牛之小者也戎也今盧水是卜盧盧人西北區陽以鱉封者若彘前後有首之名也區陽亦戎規矩以鱗者獸也牛尾一角鳥蹄也規矩亦戎也麟似塵西申以鳯鳥鳯鳥者戴仁抱義掖信歸有德蛇首魚尾其形似雞義掖信歸有德之君也戴仁向仁國抱義懷有丘羌鸞鳥謂之丘羌今謂之丘地之羌不同故亦歸仁義也丘矦鸞大於鳯巴人以比翼鳥不飛其名曰鶼鶼巴人在南者不比方揚以皇鳥皇鳥配於鳳者也方揚亦戎别名也蜀人以文翰文翰者若皋雞鳬翼州謂之澤特也鳥有文彩者皋雞似方人以孔鳥與鵉相配也亦戎别名孔卜人以丹沙蠻丹沙所出卜人西南之夷用閵采生火中色黑面夷東比夷也采若鐵也光其堅康民以稃苡者其實如李食之宜子戎之别康亦西苡即有身名也食稃州靡費費其形人身技踵自笑笑則上唇翕其目食人北方謂之吐嘍羊好行立行如人被髮州靡北狄也費費曰梟長者也前足稍都郭生生若黃狗人面能言生二名也都郭北狄生竒幹善芳善芳者頭若雄雞佩之令人不昧皆東嚮幹奇也皆東東向列次也亦北狄善芳鳥名不昧不北方臺正東高夷嗛羊嗛羊者羊而四角夷高麗句高夷東北獨鹿卭卭距虛善走也鹿獨似距虛負厥而走也西方之戎也卭卭獸孤竹距虛獸也驢騾之屬孤竹東北狄距虛不令支玄模白狐玄模則黑狐也不令支皆東北夷模不屠何青能亦東北不屠何也夷東胡黃羆北西卑東胡東山戎菽戎菽豆藥也山戎亦東北夷其西般吾白虎狄近西也次西般吾北屠州黑豹之别也屠州狄禺氏騊駼氏禺駼馬之屬也西北戎夷騊大夏茲白牛野獸也似白牛形也大夏西北戎茲白牛犬戎文馬而赤鬛縞身目若黃金名古黃之乘之逺者也犬戎西戎數楚每牛每牛者牛之小者也北戎也數楚亦胸戎狡犬狡犬者巨身四尺果皆北嚮北戎也胸奴者權扶三目蠻也玉權扶南形甚小也之有光明也白州北閭北閭者其革若於伐其木以為車終行不敗中可居者洲洲中出此珍也白州東南蠻也與白民接也水禽人管菅草堅忍亦東東蠻路人大竹蠻貢大竹路人東方之長沙鱉美故貢特大而也其西魚復鼓鐘鐘牛鼓及鐘而似牛形者美逺致次西列也魚復南蠻國也貢也蠻揚之翟貢翟鳥揚州之蠻倉吾翡翠翡翠者所以取羽其色青而有黃也倉吾亦蠻也翠羽其餘皆可知自古之政貢物也言餘謂衆諸所至也政化之南人至衆皆北嚮南越南人伊尹朝獻商書有此言别也書不周書録中以事類來附事故令附合王會期朝貢湯問伊尹曰諸侯來獻或無馬牛之所生而獻逺方之物事實相反不利求於民故不利也非其所有而當逺今吾欲因其地勢所有獻之必易得而不貴其為四方獻令服之令制其品伊尹受命於是為四方今曰臣請正東符婁仇州伊慮漚深九夷十蠻越漚鬋文身髮文身因其事以名也十者東夷蠻越之别稱剪請令以魚支之鞞鰂之醬鮫利劒為獻魚名瞂盾鞞刀削鰂之鮫文魚也也以鮫皮作正南甌鄧桂國損子産里百濮九菌者六别名南蠻之請令以珠璣珻瑁象齒文犀翠羽菌鸖短𧾱為獻旌翳短𧾱𧾱之善者也璣似珠而小菌鸖可用為正西崑崙𧾱國鬼親枳巳闟耳貫胸雕題離丘漆齒闟耳貫胸雕題漆齒九者西戎之别名也以名之也等亦因其事請令以丹青白旄紕罽江歷龍角神龜為獻解角得也江歷珠名龍正北空同大夏莎車姑他旦略貌胡戎翟胸奴樓煩月氐􅏽犁其龍東胡之别名也戎十二者北狄翟之間國名也狄在西北界戎請令以槖駝白玉野馬騊駼駃騠良弓為獻湯曰善周書卷第七
