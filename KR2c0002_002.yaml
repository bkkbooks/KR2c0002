front:
  text: 周書卷第二
  hash: sha256:dc37dbebdaf599139c98a5e49263102a4496b03e0d5e1a6fc59d0121f32b004b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0002_SBCK_002-1a}
body:
  text: 晉孔朝注明四明後學章檗校刻武稱解第六允文解第七大武解第八大明武解第九小明武解第十大匡解第十一程典解第十二程寤解第十三秦陰解第十四九政解第十五九開解第十六劉法解第十七文開解第十八保開解第十九八繁解第二十武稱解第六大國不失其威小國不失其卑敵國不失其權所謂此即也稱岠嶮伐夷並小奪亂強攻弱而襲不正武之經也常經伐亂伐疾伐疫武之順也守故曰順也武道逆取順賢者輔之亂者取之作者勸之怠者沮之恐者懼之欲者趣之武之用也為用武以美男破老美女破舌淫圖破淫巧破時淫樂破正淫言破義武之毀也以毁敵國也凡行此事所赦其衆遂其咎撫其助其囊武之間也餌敵以分而照其儲以伐輔德追時之權武之尚也分器土田以分謂以此術餌之春違其農秋伐其穯夏取其麥冬寒其衣服春秋欲舒冬夏欲亟武之時也夏寒暑盛故欲度之寒衣為敗其絲麻冬長勝短輕勝重直勝曲衆勝寡強勝弱飽勝飢肅勝怒先勝後疾勝遲武之勝也也肅敬追戎無恪窮寇不格也格鬪力倦氣竭乃易克武之追也之追敵既勝人舉旗以號令命吏禁掠無取侵暴爵位不謙田宅不虧各寧其親民服如化武之撫也寧安也謙損也百姓咸服偃兵興德夷厥險阻以毀其服四方畏服奄有天下武之定也毀敵之毀武謂允文解第七思靜振勝允文維記康文紀武以靜規勝昭告周行維旌所在亂所在旗旌治收武釋賄無遷厥里官校屬職因其百吏其收其官吏無敢攺戎器不取賄因公貨少多賑賜窮士救瘠補病賦均田布布政也主施赦命夫復服用損憂耻孤寡無告獲厚咸喜振窮敷大惠也損除憂耻謂赦罪咸問外戚書其所在遷同氏姓位之宗子及群臣宗主誅其君為之主率用十五綏用安教用顯允若得父母政也懷其德寬以政之孰云不聽聽言靡悔遵養時晦而誅之養時暗昧晦明遂語于時允武死思復生生思復所遂告以信武也使昧者修明而人知不棄愛守正戶上下和協靡敵不下言不逃亡於守正戶執彼玉圭以居其宇庶民咸耕童壯無輔無拂其取通其疆土民之望兵若待父母邦之君彼謂亂是故天下一旦而定有四海大武解第八武有六制政攻侵伐搏戰伐之政政者征善政不攻善攻不侵善侵不伐善伐不摶善搏不戰勝也言廟政有四戚五和攻有四攻五良侵有四聚三斂伐有四時三與搏有三哀四赦戰有六厲五衛六庠五虞後能致其攻此皆有義然四戚一內姓二外婚三友朋四同里親也信所宜五和一有天無惡二有人無郤三同好相固四同惡相助五逺宅不薄皆厚之雖逺居此九者政之因也成政也言因此以四攻者一攻天時二攻地宜三攻人德四攻行利其計使攻謂奪也不成五良一取仁二取智三取勇四取材五取藝務所為求字之誤也來而任之良當此九者攻之開也以成攻也言開此道四聚一酌之以仁二懷之以樂三旁聚封人四設圍以信三斂一男女比二工次三祗人死敬祗此七者侵之酌也以成侵也言酌此法四時一春違其農二夏食其榖三秋取其割四冬凍其葆凍謂發露其葆聚此皆所用以敵之三興一政以和時二伐亂以治三伐飢以飽當之也此所行此七者伐之機也要成其伐也機要也以此三哀一要不羸二喪人三擯厥親人之哀敵為惡擯一作損困窮如此要當四赦一勝人必羸二取威信復三人樂生身四赦民所惡有之皆赦救也羸謂益之復謂此七者搏之來也來之也所以懷六厲一仁厲以行二智厲以道三武厲以勇四師厲以士五校正厲御六射師厲伍也厲為治政五衛一明仁懷怒二明智輔謀三明武攝勇四明材若風行輕車翼衛在戎二方陳如此奔敵之我師之窮靡人不剛乃剛勇也知敵之強十藝一大援二明從三餘子四長興五伐人六刑餘七三疑八間書九用少十興怨赦徒刑餘興怨離構也用少者省費十因一樹仁二勝欲三賔客四通旅五親戚六無告七同事八程巧九能十利事有因也凡成皆義勝欲勝欲以藝因伐用是謂強轉應天順時時有寒暑時言易也有難風雨飢疾民乃不處移散不敗農乃啇賈委以淫樂賂以美女使沈惑也謂扇動之主人若枝至城下高堙臨內日夜不解堅也枝謂方陳並功云何能禦雖易必敬是謂明武也禦當城高難平湮之以土開之以走路俄傳器櫓山以臨之也湮土謂為土因風行火障水水下惠用元元文誨其寡恤刑也言務旁隧外權墮城湮溪老弱單處其謀乃難於保障單處無既克和服使衆咸宜竟其金革是謂大夷夷平咸皆小明武解第十凡攻之道必得地勢以順天時觀之以今稽之以古以詳順之稽考也兵凶器戰危事故攻其逆政毀其地阻立之五教以惠其下之教也五教五常矜寡無告實為之主五教允中枝葉伐興謂衆善政也為之君枝葉國為偽巧後宫飾女荒田逐獸田獵之所洊觀崇臺泉池在下淫樂無既百姓辛苦事皆可伐言凡有此上有困令乃有極上困下騰戎遷其野敦行王法濟用金鼓金鼓濟其伐濟成也言以降以列陳無悗怒按道攻巷無襲門戶伐無辜襲掩也言不赦有罪怒無受貨賂攻用弓弩上下禱祀靡神不下具行衝梯振以長旗所先後戰也禱而攻懷戚思終左右憤勇無食六畜無聚子女群振若電造於城下鼓行參呼以正什伍奮厲也言士卒之上有軒冕斧鉞在下勝國若化故曰明武為賞也軒冕所以大匡解第十一維周王宅程三年遭天之大荒後以為國𥘉王季之程地名在岐州左右飢饉後乃徙豐焉子文王因焉而遭作大匡以詔牧其方三州之侯咸率故三州也率謂奉順也文王𥘉未得三分有二王乃召冡卿三老三吏大夫百執事之人朝于大庭也大庭公堂之庭冡卿孤卿三吏三卿問罷病之故政事之失刑罰之戾哀樂之尤尤過戾罪賔客之盛用度之費及關市之征山林之匱田宅之荒溝渠之害官不修無征匱荒害皆謂怠墯之過驕頑之虐水旱之災以皆之者為失曰不榖不德政事不時國家罷病不能胥匡二三子尚助不榖官考厥職鄉問其人人政得失不尚尚也問因其耆老及其總害慎問其故無隱乃情人也總衆及某日以告于廟有不用命有常不赦常者常刑也明日王至廟告王既發命入食不舉百官質方不食饔徹膳以思其職王不舉樂百官道方及期日質明王麻衣以朝朝中無釆衣居為荒變此凶服自官考其職鄉問其利因謀其災旁匡於衆無敢有違率我故無違衆衆民也百官詰退驕頑方收不服慎惟怠墯什伍相保不服化者也萬方收收其動勸遊居事節時茂農夫任戶戶盡夫出不出夫以勸農茂勉也言無户農廩分鄉鄉命受糧程課物徵躬競比藏課程比藏者比方其收藏也農夫藏穀於廩分在諸鄉合藏不粥糴糴不加均賦灑其幣鄉正保貸不限也灑散也幣以糧不加均多從所有窮也糴以貨成年不償信誠匡助以輔殖財償所以生殖名曰貸而不也民財財殖足食克賦為征數口以食食均有賦足食均民以入官也而征其賦外食不瞻開關通糧糧窮不轉孤寡不廢轉出外也窮征困內不滯不轉留戍城不留足以守出旅分均馳車送逝旦夕運糧守之表皆共運之也不成者不令留足以於是告四方遊旅旁生欣通津濟道宿所至如歸窮者有有告者也所歸幣租輕乃作母以行其子謂錢幣之屬以貴重為母易資貴賤以均遊旅使無滯子遊旅易資亦然非但租賦作母行無粥熟無室市權內外以立均無蚤暮閭次均行無早晚之常也均平民財行之均行衆從積而勿以罰助均無使之窮平均無乏利民不淫過者罰其榖幣其穀幣通以助均雖積賞進有無不隄防之使民有無播𬞞無食種菜曰𬞞可食之以數度多少省用常用國家祈而不賔祭服漱不制制不造新也不賔殺禮不車不雕飾人不食肉畜不食榖馬也畜謂國不鄉射樂不牆合牆屋有補無作降之也皆為荒資農不敗務務不廢農桑之非公卿不賔賔不過具卿酒食唯賔公巳而哭不留日登降一等為荒廢之也留盡也降一等庶人不獨葬伍有植送往迎來亦如之共送迎亦相救也均恤輿迎亦如植有不用命有常不違程典解第十二維三月既生魄文王合六州之侯奉勤于啇下有其三分天事殷也二以服啇王用宗讒震怒無疆境也宗衆疆諸侯不娛逆諸文王文王弗忍乃作程典以命三忠從諸侯即王娛樂也不忍德常典也位所以為至曰助余體民無小不敬如毛在躬拔之痛無不省省故宜敬外也毛以喻小也無不政失患作作而無備死亡不誡誡在往事備必慎備思地思地慎制思制慎人思人慎德德開開乃無患開通言德合也以往事誡將來慎德必躬恕恕以明德德當天而慎下教天下以慎道下為上貸力競以讓讓德乃行為化以讓慎下必翼上上中立而下比爭省和而順慎同携乃爭和乃比謂無比也翼敬也中立比事無政無政無選無選民乃頑頑乃害上在官故頑民無雋選之事上害故選官以明訓頑民乃順慎守其教小大有度以備災寇吉凶也小大協其三族固其四援明其伍候習其武誡依其山川通其舟車利其守務備聖王之事修文教誡武士大夫不雜於工啇力不可力治必善其事治乃成也使各專其業啇不厚工不杇農不士之子不知義不可以長幼義方為正有士行之工不族居不足以給官族不鄉别不可以入惠其鄉所以行其惠族謂群也雖不别也為上不明為下不順無醜耻醜也言國無輕其行多其愚不習其愚何智之有不重其行自多慎地必為之圖以舉其物物其善惡物之善惡也别其地所生度其高下利其陂溝愛其農時修其等列務其土實樹範也務其勤差其施賦設得其宜宜協其務務應其趣施當也言其所慎用必愛工攻其材啇通其材百物鳥獸魚鱉無不順時愛之也順時所為生穯省用不濫其度津不行火藪林不伐不火不伐也濫過也非時牛羊不盡齒不屠用食之老不任土勸不極美美不害用用乃思慎備不敬不意多用寡立親用勝懷逺逺格而邇安振施也多用謂於安思危於始思終於邇思備於逺思近於老思行不備無違嚴戒終其義之也格至也必有忍乃有濟也終謂程寤秦隂九政九間劉法文開保開八繁周書卷第二
